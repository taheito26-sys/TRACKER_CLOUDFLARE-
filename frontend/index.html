function wireLookupDropdown({shellId,inputId,menuId,hiddenId=null,getItems,getValue,getMeta,getBadge,getSearchText,onSelect,emptyTitle,emptySub}){
  const shell=document.getElementById(shellId),input=document.getElementById(inputId),menu=document.getElementById(menuId),hidden=hiddenId?document.getElementById(hiddenId):null;
  if(!shell||!input||!menu) return {refresh:()=>{},open:()=>{},close:()=>{},toggle:()=>{}};
  let items=[];
  const refreshSource=()=>{items=(typeof getItems==='function'?getItems():[]).filter(Boolean);};
  const close=()=>{menu.classList.remove('open');shell.classList.remove('open');};
  const open=()=>{if(!menu.innerHTML.trim()) render(input.value||''); if(menu.innerHTML.trim()){closeLookupMenus(menu);menu.classList.add('open');shell.classList.add('open');}};
  const setHiddenFromExact=()=>{
    if(!hidden) return;
    const typed=(input.value||'').trim();
    const exact=items.find(item=>normName(getValue(item))===normName(typed));
    hidden.value=exact&&exact.id?exact.id:'';
  };
  const render=(query='')=>{
    refreshSource();
    const q=normName(query);
    const filtered=!q?items:items.filter(item=>normName((typeof getSearchText==='function'?getSearchText(item):getValue(item))||'').includes(q));
    if(!filtered.length){
      const ttl=typeof emptyTitle==='function'?emptyTitle(query):emptyTitle;
      const sub=typeof emptySub==='function'?emptySub(query):emptySub;
      menu.innerHTML=`<div class="lookupEmpty"><div class="lookupEmptyTitle">${esc(ttl||'No matches')}</div><div class="lookupEmptySub">${esc(sub||'Keep typing or use the + button to add a new name.')}</div></div>`;
      if((query||'').trim()){ menu.classList.add('open'); shell.classList.add('open'); } else { close(); }
      return;
    }
    menu.innerHTML=filtered.map((item,idx)=>`<button type="button" class="lookupItem" data-idx="${idx}" data-value="${esc(getValue(item))}"><span class="lookupMain"><span class="lookupName">${esc(getValue(item))}</span><span class="lookupMeta">${esc(typeof getMeta==='function'?(getMeta(item)||''):'')}</span></span>${typeof getBadge==='function'&&getBadge(item)?`<span class="lookupBadge">${esc(getBadge(item))}</span>`:''}</button>`).join('');
    menu.classList.add('open'); shell.classList.add('open');
    const rendered=filtered.slice();
    menu.querySelectorAll('.lookupItem').forEach(btn=>btn.addEventListener('click',()=>{
      const item=rendered[Number(btn.dataset.idx)];
      if(!item) return;
      input.value=getValue(item);
      if(hidden) hidden.value=item.id||'';
      if(typeof onSelect==='function') onSelect(item);
      close();
      input.dispatchEvent(new Event('change',{bubbles:true}));
    }));
  };
  input.setAttribute('autocomplete','off');
  input.addEventListener('focus',()=>render(input.value||''));
  input.addEventListener('input',()=>{setHiddenFromExact(); render(input.value||'');});
  input.addEventListener('change',()=>{setHiddenFromExact();});
  menu.addEventListener('mousedown',e=>e.preventDefault());
  document.addEventListener('click',e=>{if(!shell.contains(e.target)) close();}, true);
  return {refresh:()=>render(input.value||''),open:()=>render(input.value||''),close,toggle:()=>{if(menu.classList.contains('open')) close(); else render(input.value||'');}};
}

function escapeRe_(s){ return String(s).replace(/[.*+?^${}()|[\[\]\\]/g, "\\$&"); }

function trText_(txt){
  txt = String(txt ?? "");
  if (!uiIsAr()) return txt;

  let out = txt;
  const pairs = I18N_AR.slice().sort((a,b)=>String(b[0]).length-String(a[0]).length);
  for (const [en, ar] of pairs){
    if(!en) continue;
    const enS = String(en);
    const isWord = /^[A-Za-z][A-Za-z ]+[A-Za-z]$/.test(enS);
    const re = isWord ? new RegExp("\b"+escapeRe_(enS)+"\b","gi") : new RegExp(escapeRe_(enS),"gi");
    out = out.replace(re, ar);
  }
  // Arabic percent sign, keep Western digits
  out = out.replace(/%/g, "٪");
  return out;
}

const _i18nTextOrig = new WeakMap();
const _i18nAttrOrig = new WeakMap(); // element -> {attr:orig}
function _origText_(node){
  if(!_i18nTextOrig.has(node)) _i18nTextOrig.set(node, node.nodeValue);
  return _i18nTextOrig.get(node);
}
function _origAttr_(el, attr){
  let m = _i18nAttrOrig.get(el);
  if(!m){ m = {}; _i18nAttrOrig.set(el, m); }
  if(m[attr] == null) m[attr] = el.getAttribute(attr);
  return m[attr];
}

function applyI18n_(root){
  if(!root) return;
  const isAr = uiIsAr();

  // Text nodes
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n){
      const v = n.nodeValue;
      if(!v || !v.trim()) return NodeFilter.FILTER_REJECT;
      const p = n.parentElement;
      if(!p) return NodeFilter.FILTER_REJECT;
      if(p.closest("script,style,code,pre,textarea")) return NodeFilter.FILTER_REJECT;
      if(p.closest("[data-no-i18n],.no-i18n")) return NodeFilter.FILTER_REJECT;
      // Skip most table body data cells, keep controls inside them
      if(p.closest("tbody") && !p.closest("button,a,label,th,.navBtn,.seg,.topbar,.modal,.drawer,.pill")) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  let n;
  while((n = walker.nextNode())){
    const orig = _origText_(n);
    n.nodeValue = isAr ? trText_(orig) : orig;
  }

  // Key attributes
  const attrs = ["placeholder","title","aria-label","data-tip"];
  root.querySelectorAll(attrs.map(a=>`[${a}]`).join(",")).forEach(el=>{
    for(const a of attrs){
      if(!el.hasAttribute(a)) continue;
      const orig = _origAttr_(el, a);
      el.setAttribute(a, isAr ? trText_(orig) : orig);
    }
  });
}

// Decimal-safe helpers (Big.js when available)

const dDiv=(a,b)=>{
  const x=dNum(a), y=dNum(b);
  if(!Number.isFinite(x)||!Number.isFinite(y)||y===0) return NaN;
  if(hasBig()){ try{return Number(new Big(String(x)).div(String(y)).toString());}catch(e){} }

};
const roundHalfUpInt=n=>{

};

function recomputeFor(s){
  const batches=s.batches.map(b=>({...b,remainingUSDT:b.initialUSDT})).sort((a,b)=>a.ts-b.ts);
  const tradeCalc=new Map(),issues=[];
  const trades=s.trades.filter(t=>!t.voided).slice().sort((a,b)=>a.ts-b.ts);
  for(const t of trades){
    const rev=t.amountUSDT*t.sellPriceQAR;
    if(!t.usesStock){tradeCalc.set(t.id,{ok:true,revenueQAR:rev,costQAR:0,feeQAR:t.feeQAR,netQAR:rev-t.feeQAR,ppu:(rev-t.feeQAR)/t.amountUSDT,slices:[],avgBuyQAR:0,margin:0});continue;}
    let need=t.amountUSDT,cost=0;const slices=[];
    for(const b of batches){if(b.ts>t.ts||need<=0||b.remainingUSDT<=0)continue;const take=Math.min(b.remainingUSDT,need);if(take>0){b.remainingUSDT-=take;need-=take;cost+=take*b.buyPriceQAR;slices.push({batchId:b.id,qty:take,priceQAR:b.buyPriceQAR,source:b.source,ts:b.ts});}}
    if(need>1e-9){for(const sl of slices){const bb=batches.find(x=>x.id===sl.batchId);if(bb)bb.remainingUSDT+=sl.qty;}issues.push("Trade "+t.id+": insufficient stock");tradeCalc.set(t.id,{ok:false,revenueQAR:rev,costQAR:0,feeQAR:t.feeQAR,netQAR:0,ppu:0,slices:[],avgBuyQAR:0,margin:0,reason:"Insufficient stock"});continue;}
    const avgBuy=t.amountUSDT>0?cost/t.amountUSDT:0,net=rev-cost-t.feeQAR,margin=cost>0?(net/cost)*100:0;
    tradeCalc.set(t.id,{ok:true,revenueQAR:rev,costQAR:cost,feeQAR:t.feeQAR,netQAR:net,ppu:net/t.amountUSDT,slices,avgBuyQAR:avgBuy,margin,reason:""});
  }
  return{batches,tradeCalc,health:{ok:!issues.length,issues}};
}
function recompute(){derived=recomputeFor(state);}
function totalStock(){return derived.batches.reduce((s,b)=>s+Math.max(0,b.remainingUSDT),0);}
function stockCostQAR(){return derived.batches.reduce((s,b)=>s+Math.max(0,b.remainingUSDT)*b.buyPriceQAR,0);}
function getWACOP(){const a=derived.batches.filter(b=>b.remainingUSDT>0);if(!a.length)return null;const tv=a.reduce((s,b)=>s+b.remainingUSDT*b.buyPriceQAR,0),ta=a.reduce((s,b)=>s+b.remainingUSDT,0);return ta>0?tv/ta:null;}
function kpiFor(range){
  const trades=state.trades.filter(t=>!t.voided&&inRange(t.ts,range));
  let rev=0,net=0,qty=0,fee=0;
  for(const t of trades){const c=derived.tradeCalc.get(t.id);rev+=t.amountUSDT*t.sellPriceQAR;qty+=t.amountUSDT;fee+=t.feeQAR;if(c?.ok)net+=c.netQAR;}
  const margins=trades.map(t=>{const c=derived.tradeCalc.get(t.id);return c?.ok?c.margin:null;}).filter(x=>x!==null);
  const avgMgn=margins.length?margins.reduce((s,v)=>s+v,0)/margins.length:0;
  return{rev,net,qty,fee,count:trades.length,avgMgn};
}
function batchCycleTime(id){const b=state.batches.find(x=>x.id===id);if(!b)return null;const cs=state.trades.filter(t=>{const c=derived.tradeCalc.get(t.id);return c?.ok&&c.slices.some(s=>s.batchId===id);});return cs.length?Math.max(...cs.map(t=>t.ts))-b.ts:null;}

var _settingsDraft = null;
var _settingsDirty = false;

function deepClone_(x){ try{ return JSON.parse(JSON.stringify(x)); }catch(e){ return x; } }

function settingsDraftEnsure_(){
  if (_settingsDraft) return;
  _settingsDraft = {
    settings: deepClone_(state.settings || {}),
    prefs: deepClone_(state.prefs || {}),
    ui: { theme: state.theme, layout: state.layout }
  };
  _settingsDirty = false;
  updateSaveSettingsBtn_();
}

function settingsDraftSet_(path, value){
  settingsDraftEnsure_();
  var parts = String(path||"").split(".");
  var root = parts.shift();
  var obj = _settingsDraft[root];
  if (!obj) return;
  while (parts.length > 1){
    var k = parts.shift();
    obj[k] = (obj[k] && typeof obj[k] === "object") ? obj[k] : {};
    obj = obj[k];
  }
  obj[parts[0]] = value;
  _settingsDirty = true;
  updateSaveSettingsBtn_();
}

function commitSettingsDraft_(){
  if (!_settingsDraft) return toast("No pending changes","warn");
  state.settings = sanitize(_settingsDraft.settings || {});
  state.prefs    = deepClone_(_settingsDraft.prefs || {});
  state.theme    = String((_settingsDraft.ui && _settingsDraft.ui.theme) || state.theme || "indigo");
  state.layout   = String((_settingsDraft.ui && _settingsDraft.ui.layout) || state.layout || "flux");
  _settingsDraft = null;
  _settingsDirty = false;
  applyLayout();
  saveRecompute("Settings saved","good");
  // Ensure cloud sync happens after an explicit settings commit (if enabled)
  try {
    if (gasAutoSaveEnabled_()) setTimeout(function(){ try{ syncSchedule(); }catch(e){ console.error("merchant sync failed", e); } }, 0);
  } catch(e) {}

  // If Auto-backup is OFF, settings are saved locally only.
  try{ var cb=document.getElementById("gasAutoSave"); if(cb && !cb.checked){ toast("Settings saved locally (Auto-backup is OFF)","warn"); } }catch(e){}

  updateSaveSettingsBtn_();
}

function discardSettingsDraft_(){
  _settingsDraft = null;
  _settingsDirty = false;
  updateSaveSettingsBtn_();
  toast("Discarded pending settings","warn");
  render();
}

function updateSaveSettingsBtn_(){
  var btn = document.getElementById("saveSettingsBtn");
  if (!btn) return;
  // Show on Settings page, or whenever there are pending settings
  var show = (_settingsDirty || (state && state.page === "settings"));
  btn.style.display = show ? "inline-flex" : "none";
  btn.disabled = !_settingsDirty;
  if (_settingsDirty) btn.classList.add("dirty"); else btn.classList.remove("dirty");
}

// ── Dynamic font sizing (responsive + vision profile) ──────────────────────────
const FONT_CONFIG = {
  baseSize: 11, minSize: 9, maxSize: 18,
  breakpoints: { mobile: 480, tablet: 900, desktop: 1366, wide: 1920 },
  scaleFactors: { mobile: 0.9, tablet: 1.0, desktop: 1.05, wide: 1.1 },
  visionProfiles: { standard: 1.0, large: 1.15, xlarge: 1.3, compact: 0.9 }
};

function detectOptimalFontSize_(baseSize, visionProfile){
  var width = window.innerWidth || 1366;
  var base = Number(baseSize || FONT_CONFIG.baseSize) || FONT_CONFIG.baseSize;

  var scale = 1.0;
  if (width < FONT_CONFIG.breakpoints.mobile) scale = FONT_CONFIG.scaleFactors.mobile;
  else if (width < FONT_CONFIG.breakpoints.tablet) scale = FONT_CONFIG.scaleFactors.tablet;
  else if (width < FONT_CONFIG.breakpoints.desktop) scale = FONT_CONFIG.scaleFactors.desktop;
  else scale = FONT_CONFIG.scaleFactors.wide;

  var vm = FONT_CONFIG.visionProfiles[String(visionProfile||"standard")] || 1.0;
  var finalSize = Math.round(base * scale * vm);
  finalSize = Math.max(FONT_CONFIG.minSize, Math.min(FONT_CONFIG.maxSize, finalSize));
  return finalSize;
}

function applyLayoutPreview_(){
  // Apply layout/theme/font preview from draft (no persistence)
  var theme = state.theme, layout = state.layout;
  var prefs = state.prefs || {};
  if (_settingsDraft){
    if (_settingsDraft.ui){
      theme = String(_settingsDraft.ui.theme || theme);
      layout = String(_settingsDraft.ui.layout || layout);
    }
    prefs = Object.assign({}, prefs, _settingsDraft.prefs || {});
  }
  document.body.setAttribute("data-layout", layout);
  document.body.setAttribute("data-theme", theme);

  var lf = prefs.ledgerFont || "Inter";
  var base = Number(prefs.ledgerFontSize || FONT_CONFIG.baseSize) || FONT_CONFIG.baseSize;
  var autoOff = !!prefs.autoFontDisable;
  var vp = prefs.fontVisionProfile || "standard";
  var size = autoOff ? base : detectOptimalFontSize_(base, vp);

  var lfsClamped = Math.max(FONT_CONFIG.minSize, Math.min(FONT_CONFIG.maxSize, Number(size)||FONT_CONFIG.baseSize));
  var uiScale = Number((lfsClamped / FONT_CONFIG.baseSize).toFixed(4));

  document.documentElement.style.setProperty("--app-font","'"+lf+"', sans-serif");
  document.documentElement.style.setProperty("--ui-fs", lfsClamped + "px");
  document.documentElement.style.setProperty("--ui-scale", uiScale);
  document.documentElement.style.setProperty("--ledger-font","'"+lf+"', sans-serif");
  document.documentElement.style.setProperty("--ledger-fs", lfsClamped + "px");
}

// Auto refresh font size on resize if auto font is enabled
;(function(){
  var _t = null;
  window.addEventListener("resize", function(){
    clearTimeout(_t);
    _t = setTimeout(function(){
      var prefs = (_settingsDraft && _settingsDraft.prefs) ? Object.assign({}, state.prefs, _settingsDraft.prefs) : (state.prefs||{});
      if (prefs.autoFontDisable) return;
      applyLayoutPreview_();
    }, 250);
  });
})();
function applyLayout(){
  const b=document.body;
  b.setAttribute("data-layout",state.layout);
  b.setAttribute("data-theme",state.theme);
  // Global font injection (applies to all tabs)
  const prefs = state.prefs || {};
  const lf = prefs.ledgerFont || "Inter";
  const base = Number(prefs.ledgerFontSize || FONT_CONFIG.baseSize) || FONT_CONFIG.baseSize;
  const autoOff = !!prefs.autoFontDisable;
  const vp = prefs.fontVisionProfile || "standard";
  const computed = autoOff ? base : detectOptimalFontSize_(base, vp);
  const lfsClamped = Math.max(FONT_CONFIG.minSize, Math.min(FONT_CONFIG.maxSize, Number(computed) || FONT_CONFIG.baseSize));
  const uiScale = Number((lfsClamped / FONT_CONFIG.baseSize).toFixed(4));
  document.documentElement.style.setProperty("--app-font","'"+lf+"', sans-serif");
  document.documentElement.style.setProperty("--ui-fs",lfsClamped+"px");
  document.documentElement.style.setProperty("--ui-scale",uiScale);
  // Backward compatibility for any ledger-only rules
  document.documentElement.style.setProperty("--ledger-font","'"+lf+"', sans-serif");
  document.documentElement.style.setProperty("--ledger-fs",lfsClamped+"px");
}

function cssToRgba(color,alpha){
  // hex #rrggbb or #rgb
  var h=String(color||"").trim();
  if(h.startsWith("#")){
    var r,g,b;
    if(h.length===4){r=parseInt(h[1]+h[1],16);g=parseInt(h[2]+h[2],16);b=parseInt(h[3]+h[3],16);}
    else{r=parseInt(h.slice(1,3),16);g=parseInt(h.slice(3,5),16);b=parseInt(h.slice(5,7),16);}
    if(isNaN(r)||isNaN(g)||isNaN(b))return "rgba(99,102,241,"+alpha+")";
    return "rgba("+r+","+g+","+b+","+alpha+")";
  }
  // rgba(r,g,b,a) — replace alpha
  if(h.startsWith("rgba("))return h.replace(/,[\d.]+\)$/,","+alpha+")");
  // rgb(r,g,b) — convert
  if(h.startsWith("rgb("))return h.replace("rgb(","rgba(").replace(")",","+alpha+")");
  return "rgba(99,102,241,"+alpha+")";
}

      if(!state.prefs.allowInvalidTrades&&usesStock){

        const testTrades=state.trades.map(x=>x.id===id?testTrade:x);

      closeModal();

function deleteBatch(id, skipConfirm){
  const b=state.batches.find(x=>x.id===id);if(!b)return;
  const db=derived.batches.find(x=>x.id===id);
  const used=db?Math.max(0,b.initialUSDT-(db.remainingUSDT||0)):0;
  if(!skipConfirm){
    const warnUsed=used>1e-9?`\n\n⚠ ${fmtU(used)} USDT already consumed by FIFO trades — deleting will break those calculations.`:"";
    if(!confirm("Delete this batch permanently? (Restore via Vault snapshot if needed)"+warnUsed)) return;
  }
  try{
    if(window.VaultAPI && typeof window.VaultAPI.idbSave==="function"){
      window.VaultAPI.idbSave("snap_"+Date.now(), JSON.parse(JSON.stringify(state)), "pre_delete_batch").catch(function(){});
    }
  }catch(e){}
  state.batches=(state.batches||[]).filter(x=>x.id!==id);
  saveRecompute("Batch deleted","warn");
}

function editBatch(id){

        </select>

        <div class="label">Qty USDT</div>
        <input id="eb_amt" class="input" value="${b.initialUSDT}" ${fullyDepleted?"style='opacity:.6;'" : ""}/>
        ${partiallyConsumed?`<div class="muted" style="font-size:calc(9px * var(--ui-scale,1));margin-top:3px;">Min ${fmtU(used)} (already used)</div>`:""}
      </div>
      <div class="field">
        <div class="label">Buy price QAR</div>

      <span class="pill">Remaining <strong>${fmtU(rem)}</strong></span>
      <span class="pill">Used <strong>${fmtU(used)}</strong></span>
      <span class="pill ${batchProfit>=0?"good":"bad"}">Profit <strong>${(batchProfit>=0?"+":"")+fmtQ(batchProfit)}</strong></span>
      <span class="pill">Invested <strong>${fmtQWithUnit(b.initialUSDT*b.buyPriceQAR)}</strong></span>
    </div>
    <div class="msg err" id="eb_err" style="margin-top:8px;"></div>`,
    `<div style="display:flex;justify-content:space-between;gap:8px;width:100%;flex-wrap:wrap;">
      <button class="btn secondary" id="eb_cancel">Cancel</button>
      <div style="display:flex;gap:6px;">

        <button class="btn" id="eb_save">Save Changes</button>
      </div>
    </div>`);

  setTimeout(()=>{
    // Sync select ↔ custom input
    const selEl=$("#eb_src"),customEl=$("#eb_src_custom");
    selEl?.addEventListener("change",()=>{ if(selEl.value && customEl) customEl.value=""; });
    customEl?.addEventListener("input",()=>{ if(customEl.value.trim() && selEl) selEl.value=""; });

    $("#eb_cancel")?.addEventListener("click",closeModal);

    $("#eb_delete")?.addEventListener("click",()=>{
      closeModal();
      deleteBatch(id);
    });

      const amt=num($("#eb_amt").value);
      const px=num($("#eb_px").value);
      const note=$("#eb_note")?.value.trim()||"";
      // Resolve supplier: custom input takes priority over dropdown
      const srcCustom=(customEl?.value||"").trim();
      const srcSelect=(selEl?.value||"").trim();
      const src=srcCustom||srcSelect;

      if(!Number.isFinite(ts2)){$("#eb_err").textContent="Invalid date — please fix.";return;}
      if(!(amt>0)){$("#eb_err").textContent="Qty USDT must be greater than 0.";return;}
      if(!(px>0)){$("#eb_err").textContent="Buy price QAR must be greater than 0.";return;}
      if(!src){$("#eb_err").textContent="Supplier / source is required.";return;}

      // Block reducing qty below already-consumed amount
      if(amt<used-1e-9){
        $("#eb_err").textContent=`Cannot reduce qty below consumed amount (${fmtU(used)} USDT already allocated by FIFO trades).`;
        return;
      }

      // Validate: simulate FIFO recompute with updated batch and check no valid trades break
      const testBatch={...b,ts:ts2,source:src,note,initialUSDT:amt,buyPriceQAR:px};
      const testState={...state,batches:state.batches.map(x=>x.id===id?testBatch:x)};
      const testDerived=recomputeFor(testState);
      const prevOkIds=new Set();
      state.trades.forEach(t=>{const c=derived.tradeCalc.get(t.id);if(c?.ok)prevOkIds.add(t.id);});
      const newlyBroken=[];
      prevOkIds.forEach(tid=>{const nc=testDerived.tradeCalc.get(tid);if(!nc?.ok)newlyBroken.push(tid);});
      if(newlyBroken.length){
        $("#eb_err").textContent=`Change would break ${newlyBroken.length} FIFO-backed trade(s). Adjust qty or date.`;
        return;
      }

      // Store revision snapshot before editing
      b.revisions=Array.isArray(b.revisions)?b.revisions:[];
      b.revisions.unshift({at:Date.now(),before:{ts:b.ts,source:b.source,note:b.note,initialUSDT:b.initialUSDT,buyPriceQAR:b.buyPriceQAR}});
      b.revisions=b.revisions.slice(0,20);

      // Apply
      b.ts=ts2;b.source=src;b.note=note;b.initialUSDT=amt;b.buyPriceQAR=px;
      saveRecompute("Batch updated in place ✓","good");
      closeModal();
    });
  },0);
}

  const urls=[BINANCE,`https://corsproxy.io/?url=${encodeURIComponent(BINANCE)}`,`https://proxy.cors.sh/${BINANCE}`];
  for(const u of urls){try{const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json",...(u!==BINANCE?{"x-requested-with":"XMLHttpRequest"}:{})},body,signal:AbortSignal.timeout(8000)});if(r.ok){const j=await r.json();if(Array.isArray(j?.data))return j.data;}}catch{}}
  throw new Error("P2P unreachable — no CORS proxy responded");
}
function parseP2PDirect(data,side){
  const o=(data||[]).map(r=>({
    price:num(r?.adv?.price),
    min:num(r?.adv?.minSingleTransAmount),
    max:num(r?.adv?.dynamicMaxSingleTransAmount??r?.adv?.maxSingleTransAmount),
    nick:String(r?.advertiser?.nickName||""),
    methods:(r?.adv?.tradeMethods||[]).map(x=>x.tradeMethodName).filter(Boolean),
    available:num(r?.adv?.tradableQuantity||r?.adv?.surplusAmount||0)
  })).filter(o=>o.price>0);
  const sorted=o.slice().sort((a,b)=>side==="sell"?b.price-a.price:a.price-b.price);
  const N=Math.min(5,sorted.length);
  const avg=sorted.slice(0,N).reduce((s,x)=>s+x.price,0)/(N||1)||null;
  const best=sorted[0]?.price||null;
  const depth=sorted.slice(0,5).reduce((s,x)=>{
    return side==="sell"
      ?s+Math.min(x.max,x.available>0?x.available*x.price:x.max)
      :s+Math.min(x.max/(x.price||1),x.available>0?x.available:x.max/(x.price||1));
  },0);
  return{avg,best,depth,offers:o};
}

// ── Apply a Worker API response to the p2p state object ──────────
function _applyP2PResponse(data){
  p2p.sellAvg    = data.sellAvg    || null;
  p2p.buyAvg     = data.buyAvg     || null;
  p2p.bestSell   = data.bestSell   || null;
  p2p.bestBuy    = data.bestBuy    || null;
  p2p.sellDepth  = data.sellDepth  || 0;
  p2p.buyDepth   = data.buyDepth   || 0;
  p2p.spread     = data.spread     || null;
  p2p.sellOffers = Array.isArray(data.sellOffers) ? data.sellOffers : [];
  p2p.buyOffers  = Array.isArray(data.buyOffers)  ? data.buyOffers  : [];
  p2p.ts         = data.ts         || Date.now();
  p2p.dayStats   = data.dayStats   || null;
  p2p.ageMs      = data.ageMs      || null;
  p2p.source     = data.source     || "api";
  // Merge backend history — backend has 24h+, session history overlaps
  if(Array.isArray(data.history)&&data.history.length>0){
    // Combine backend history with any local session points newer than the last backend point
    const lastBackendTs=data.history[data.history.length-1]?.ts||0;
    const localNew=p2p.history.filter(h=>h.ts>lastBackendTs);
    p2p.history=[...data.history,...localNew].slice(-720);
  }
}

// ── Primary: fetch from your Cloudflare Worker API ───────────────
async function p2pFetchFromAPI(){
  const url=P2P_API_URL.replace(/\/+$/,"")+"/api/p2p";
  const r=await fetch((/^\/api\//.test(url) ? MERCHANT_API_BASE + url : url),{signal:AbortSignal.timeout(10000)});
  if(!r.ok) throw new Error(`Worker API ${r.status}`);
  const data=await r.json();
  if(data.error) throw new Error(data.error);
  return data;
}

// ── Main refresh: API-first, falls back to direct Binance ─────────
async function refreshP2P(){
  if(p2p.loading)return;
  p2p.loading=true;
  p2p.err="";
  if(state.page==="p2p")render();

  try{
    // ── Try Worker API first ───────────────────────────────────
    if(P2P_API_URL&&P2P_API_URL.trim()){
      try{
        const data=await p2pFetchFromAPI();
        _applyP2PResponse(data);
        // If backend data is stale (>4min), note it but don't error
        const staleWarn=p2p.ageMs&&p2p.ageMs>240000;
        toast(
          `Sell ${fmtP(p2p.sellAvg)} · Buy ${fmtP(p2p.buyAvg)}`+(staleWarn?" · ⚠ cached "+Math.round(p2p.ageMs/60000)+"m ago":""),
          staleWarn?"warn":"good"
        );
        p2p.usingAPI=true;
      }catch(apiErr){
        // API failed — fall through to direct
        console.warn("[p2p] Worker API failed, falling back to direct:",apiErr.message);
        p2p.usingAPI=false;
        throw apiErr;  // will be caught by outer catch which does direct
      }
    } else {
      // No API URL configured → direct Binance
      throw new Error("no-api-url");
    }
  }catch(e){
    // ── Fallback: direct Binance ───────────────────────────────
    if(e.message==="no-api-url"||!p2p.usingAPI){
      try{
        const[bD,sD]=await Promise.all([p2pFetchDirect("BUY"),p2pFetchDirect("SELL")]);
        const s1=parseP2PDirect(bD,"sell"),s2=parseP2PDirect(sD,"buy");
        p2p.sellAvg=s1.avg;   p2p.sellOffers=s1.offers;
        p2p.bestSell=s1.best; p2p.sellDepth=s1.depth;
        p2p.buyAvg=s2.avg;    p2p.buyOffers=s2.offers;
        p2p.bestBuy=s2.best;  p2p.buyDepth=s2.depth;
        p2p.ts=Date.now();
        p2p.source="direct";
        // Append to local session history
        p2p.history.push({ts:p2p.ts,sellAvg:p2p.sellAvg,buyAvg:p2p.buyAvg,spread:p2p.sellAvg&&p2p.buyAvg?p2p.sellAvg-p2p.buyAvg:null});
        if(p2p.history.length>20)p2p.history=p2p.history.slice(-20);
        toast(`Sell ${fmtP(p2p.sellAvg)} · Buy ${fmtP(p2p.buyAvg)}`+(P2P_API_URL?" · via fallback":""),"good");
        p2p.usingAPI=false;
      }catch(fallbackErr){
        p2p.err=String(fallbackErr.message||fallbackErr);
        toast("P2P failed: "+p2p.err,"bad");
      }
    } else {
      p2p.err=String(e.message||e);
      toast("P2P failed: "+p2p.err,"bad");
    }
  }finally{
    p2p.loading=false;
    // Price alert check
    if(p2p.sellAvg){
      const w=getWACOP();
      if(w){const spPct=Math.abs((p2p.sellAvg-w)/w*100);const thr=num(state.settings?.priceAlertThreshold,2);if(thr>0&&spPct>thr)setTimeout(()=>toast("⚠ Price alert: "+String(Math.trunc(spPct))+"% from Av Price","warn"),900);}
    }
    if(state.page==="p2p")render();
  }
}

    const _cfv=v=>v>=0?`${_good}bb`:`${_bad}bb`;

      const name=$("#qs_name")?.value.trim();

function renderTradeTable(trades){
  const custNameById = (cid)=>{
    if(!cid) return "";
    const c=(state.customers||[]).find(x=>x.id===cid);
    return c?String(c.name||"").trim():"";
  };
  const rows=trades.map(t=>{
    const c=derived.tradeCalc.get(t.id),ok=!!c?.ok,rev=t.amountUSDT*t.sellPriceQAR,net=ok?c.netQAR:NaN;
    const badge=ok?``:`<span class="pill bad" style="font-size:calc(9px * var(--ui-scale,1));">!</span>`;
    const margin=ok&&rev>0?c.netQAR/rev:NaN,pct=Number.isFinite(margin)?Math.min(1,Math.abs(margin)/0.05):0;
    const cn=custNameById(t.customerId);
    return`<tr>
      <td>
        <div style="display:flex;gap:5px;align-items:center;min-width:0;">
          <span class="mono" style="white-space:nowrap;">${esc(fmtDate(t.ts))}</span>
          ${badge}
        </div>
      </td>
      <td>
        ${cn
          ?`<span class="tradeBuyerChip" title="${esc(cn)}" style="max-width:130px;">${esc(cn)}</span>`
          :`<span style="color:var(--muted);font-size:calc(9px * var(--ui-scale,1));">—</span>`
        }
      </td>
      <td class="mono r">${fmtU(t.amountUSDT)}</td>
      <td class="mono r">${ok?fmtP(c.avgBuyQAR):"—"}</td>
      <td class="mono r">${fmtP(t.sellPriceQAR)}</td>
      <td class="mono r">${fmtQ(rev)}</td>
      <td class="mono r" style="color:${Number.isFinite(net)?(net>=0?"var(--good)":"var(--bad)"):"var(--muted)"};font-weight:700;">${Number.isFinite(net)?((net>=0?"+":"")+fmtQ(net)):"—"}</td>
      <td><div class="${Number.isFinite(margin)&&margin<0?"prog neg":"prog"}"><span style="width:${(pct*100).toFixed(0)}%"></span></div><div class="muted" style="font-size:calc(9px * var(--ui-scale,1));margin-top:2px;">${Number.isFinite(margin)?((margin*100).toFixed(2)+"% margin"):"—"}</div></td>
      <td>
        <div class="actionsRow">
          <button class="rowBtn" data-act="detail" data-id="${esc(t.id)}" data-tip="Toggle inline FIFO detail&#10;Slices, cycle time, cost breakdown">▶ Details</button>
          <button class="rowBtn" data-act="edit" data-id="${esc(t.id)}" data-tip="Edit / Correct / Delete (inside)&#10;Correct edits the original record in place">Edit</button>
        </div>
      </td>
    </tr>
    <tr id="det-${t.id.replace(/[^a-zA-Z0-9_-]/g,"_")}" style="display:none;"><td colspan="9">${renderTradeDetail(t,c)}</td></tr>`;
  }).join("");
  return`<div class="tableWrap ledgerWrap"><table><thead><tr><th>Date</th><th>Buyer</th><th class="r">Qty</th><th class="r">Avg Buy</th><th class="r">Sell</th><th class="r">Volume</th><th class="r">Net</th><th>Margin</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderTradeDetail(t,c){
  const ok=!!c?.ok,rev=t.amountUSDT*t.sellPriceQAR,net=ok?c.netQAR:NaN;
  const cy=ok&&c.slices.length?t.ts-Math.min(...c.slices.map(s=>s.ts)):null;
  return`<div style="background:var(--panel2);border-radius:var(--lt-radius-sm);padding:10px;margin:4px;">
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;">
      <span class="pill">${esc(new Date(t.ts).toLocaleString(uiLocale()))}</span>
      ${ok?`<span class="pill">Avg Buy ${fmtP(c.avgBuyQAR)}</span>`:""}
      <span class="pill">Revenue ${fmtQ(rev)}</span>
      <span class="pill">Fee ${fmtQ(t.feeQAR)}</span>
      ${ok?`<span class="pill">Cost ${fmtQ(c.costQAR)}</span>`:""}
      <span class="pill ${Number.isFinite(net)?(net>=0?"good":"bad"):""}">Net ${Number.isFinite(net)?(net>=0?"+":"")+fmtQ(net):"—"}</span>
      ${cy!==null?`<span class="cycle-badge">Cycle ${fmtDur(cy)}</span>`:""}
    </div>
    <div style="font-size:calc(9px * var(--ui-scale,1));font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;">FIFO SLICES</div>
    ${ok&&c.slices.length?c.slices.map(s=>{const b=state.batches.find(x=>x.id===s.batchId);const pct=b?(s.qty/b.initialUSDT*100).toFixed(1):"?";return`<div class="muted" style="font-size:calc(10px * var(--ui-scale,1));margin:2px 0;">${esc(s.source||"—")} · <span class="mono">${fmtU(s.qty)}</span> @ <span class="mono">${fmtP(s.priceQAR)}</span> <span class="cycle-badge">${pct}% of batch</span></div>`;}).join(""):`<div class="msg ${!ok?"err":""}">No slices${!ok?" — "+esc(c?.reason||""):""}</div>`}
    ${t.note?`<div class="muted" style="margin-top:6px;font-size:calc(10px * var(--ui-scale,1));">📝 ${esc(t.note)}</div>`:""}
  </div>`;
}

  const suppliers=[...new Set(state.batches.map(b=>b.source.trim()).filter(Boolean))];
  if(suppliers.length){
    const suppHtml=`<div class="panel" style="margin-top:9px;"><div class="panel-head"><h2>📦 Suppliers</h2><span class="pill" data-tip="Auto-populated from batch sources&#10;Click to filter">Auto-tracked</span></div><div class="panel-body" style="display:flex;flex-wrap:wrap;gap:5px;">${suppliers.map(s=>`<span class="pill" style="cursor:pointer;" data-tip="Supplier: ${s}&#10;Total batches: ${state.batches.filter(b=>b.source===s).length}&#10;Total: ${state.batches.filter(b=>b.source===s).reduce((a,b)=>a+b.initialUSDT,0).toFixed(0)}" onclick="document.getElementById('q').value='${s}';document.getElementById('q').dispatchEvent(new Event('input'));">${s}</span>`).join("")}</div></div>`;
    const pb3=document.getElementById("pageBody");if(pb3)pb3.insertAdjacentHTML("beforeend",suppHtml);
  }
  $("#b_add")?.addEventListener("click",addBatch);
  // Supplier picker is handled by the modern searchable dropdown
  const pb=$("#pageBody");if(pb)pb.addEventListener("click",e=>{const btn=e.target.closest("button[data-act]");if(!btn)return;if(btn.dataset.act==="editB")editBatch(btn.dataset.id);if(btn.dataset.act==="deleteB")deleteBatch(btn.dataset.id);});
}

function renderBatchTable(batches){
  const rows=batches.map(b=>{
    const rem=Number.isFinite(b.remaining)?b.remaining:b.initialUSDT;
    const pct=b.initialUSDT>0?rem/b.initialUSDT:0,prog=Math.max(0,Math.min(100,pct*100));
    const ct=batchCycleTime(b.id);
    const st=rem<=1e-9?"Depleted":rem<b.initialUSDT?"Partial":"Fresh";
    const stCls=rem<=1e-9?"bad":rem<b.initialUSDT?"warn":"good";
    return`<tr>
      <td class="mono">${esc(fmtDate(b.ts))}</td>
      <td>${esc(b.source||"—")}</td>
      <td class="mono r">${fmtU(b.initialUSDT)}</td>
      <td class="mono r">${fmtP(b.buyPriceQAR)}</td>
      <td class="mono r">${fmtU(rem)}</td>
      <td><div class="prog"><span style="width:${prog.toFixed(0)}%"></span></div><div class="muted" style="font-size:calc(9px * var(--ui-scale,1));margin-top:2px;">${prog.toFixed(0)}% remaining</div></td>
      <td class="mono r" style="color:${(b.profit||0)>=0?"var(--good)":"var(--bad)"};font-weight:700;">${(b.profit||0)>=0?"+":""}${fmtQ(b.profit||0)}</td>
      <td><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;"><span class="pill ${stCls}">${st}</span>${ct!==null?`<span class="cycle-badge">${fmtDur(ct)}</span>`:""}<button class="rowBtn" data-act="editB" data-id="${esc(b.id)}">Edit</button></div></td>
    </tr>`;
  }).join("");
  return`<div class="tableWrap"><table><thead><tr><th>Date</th><th>Source</th><th class="r">Total</th><th class="r">Buy</th><th class="r">Rem</th><th>Usage</th><th class="r">Profit</th><th>Status · Edit</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ── P2P ──────────────────────────────────────────────────────────
function renderP2P(){
  setHeader("P2P Market","Live Binance QAR · 24h backend monitoring");
  const wacop=getWACOP(), stock=totalStock(), cash=num(state.cashQAR,0);
  const ts=p2p.ts?new Date(p2p.ts).toLocaleTimeString():"—";
  const spread=p2p.sellAvg&&p2p.buyAvg?p2p.sellAvg-p2p.buyAvg:null;
  const spreadPct=spread&&p2p.buyAvg?(spread/p2p.buyAvg*100):null;
  const targetMargin=num(state.settings?.priceAlertThreshold,2);
  const targetSell=wacop?wacop*(1+targetMargin/100):null;
  const sellIsGood=p2p.sellAvg&&targetSell?p2p.sellAvg>=targetSell:false;
  const restockIsGood=p2p.buyAvg&&wacop?p2p.buyAvg<wacop:false;
  const profitNow=p2p.sellAvg&&wacop&&stock>0?stock*(p2p.sellAvg-wacop):null;
  const day=p2p.dayStats;
  const calcMode=p2p._calcMode||"sell";
  const usingBackend=p2p.usingAPI&&P2P_API_URL;

  // sparkline bars
  function mkSpark(key,color){
    const h=p2p.history||[];if(h.length<2)return`<span class="muted" style="font-size:9px;">Need 2+ data points</span>`;
    const vals=h.map(x=>x[key]).filter(v=>v>0);if(!vals.length)return"";
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||0.01;
    return`<div style="display:flex;align-items:flex-end;gap:2px;height:24px;">`+
      vals.slice(-40).map((v,i,a)=>{const h2=Math.max(3,Math.round(((v-mn)/rng)*20)+4);const isLast=i===a.length-1;
        return`<div title="${fmtP(v)}" style="width:5px;height:${h2}px;border-radius:2px 2px 0 0;background:${isLast?`var(--${color})`:`color-mix(in srgb,var(--${color}) 40%,transparent)`};flex-shrink:0;"></div>`;
      }).join("")+
      `<span style="font-size:9px;color:var(--${color});margin-left:4px;align-self:center;">${fmtP(vals[vals.length-1])}</span></div>`;
  }

  // offer table with relative price bars + fit check
  function mkOfferTable(offers,side){
    const sorted=(offers||[]).slice().sort((a,b)=>side==="sell"?b.price-a.price:a.price-b.price).slice(0,8);
    if(!sorted.length)return`<div class="muted" style="padding:16px;text-align:center;font-size:11px;">No data — click Refresh</div>`;
    const prices=sorted.map(o=>o.price),pMin=Math.min(...prices),pMax=Math.max(...prices),pRng=pMax-pMin||0.01;
    const col=side==="sell"?"good":"bad";
    return`<div class="tableWrap"><table>
      <thead><tr><th>Trader</th><th class="r">Price</th><th></th><th class="r">Min</th><th class="r">Max</th><th>Methods</th><th>✓</th></tr></thead>
      <tbody>${sorted.map((o,i)=>{
        const bw=Math.max(8,Math.round(((o.price-pMin)/pRng)*60)+8);
        const fit=side==="sell"
          ?(stock>0&&stock*o.price>=o.min&&stock*o.price<=o.max*1.5)
          :(cash>0&&cash>=o.min&&cash<=o.max*1.5);
        const meths=(o.methods||[]).slice(0,2).map(m=>`<span style="display:inline-block;padding:1px 4px;border-radius:4px;background:var(--panel2);border:1px solid var(--line);font-size:8px;">${esc(m)}</span>`).join(" ");
        return`<tr style="${i===0?`background:color-mix(in srgb,var(--${col}) 7%,transparent);`:""}">
          <td style="font-size:10px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${i===0?`<span style="color:var(--${col});font-weight:800;font-size:9px;">★ </span>`:""}${esc(o.nick||"—")}</td>
          <td class="mono r" style="color:var(--${col});font-weight:${i===0?800:600};">${o.price.toFixed(2)}</td>
          <td style="width:68px;padding:0 4px;"><div style="height:6px;border-radius:3px;background:var(--panel2);"><div style="height:100%;width:${bw}px;max-width:64px;background:var(--${col});border-radius:3px;opacity:.7;"></div></div></td>
          <td class="mono r" style="font-size:10px;">${o.min.toFixed(0)}</td>
          <td class="mono r" style="font-size:10px;">${o.max.toFixed(0)}</td>
          <td style="font-size:9px;">${meths||`<span class="muted">—</span>`}</td>
          <td style="text-align:center;font-size:11px;">${fit?`<span style="color:var(--good);font-weight:700;">✓</span>`:`<span style="color:var(--muted);">—</span>`}</td>
        </tr>`;
      }).join("")}</tbody></table></div>`;
  }

  $("#pageBody").innerHTML=`
  ${p2p.err?`<div class="msg err" style="margin-bottom:10px;">${esc(p2p.err)}</div>`:""}

  <!-- TOOLBAR -->
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
    <button class="btn" id="p_refresh" ${p2p.loading?"disabled":""} style="min-width:110px;">
      ${p2p.loading?`⏳ Loading…`:`🔄 Refresh`}
    </button>
    <span class="pill" style="font-size:10px;">Updated ${esc(ts)}</span>
    ${usingBackend
      ?`<span class="pill good" style="font-size:9px;font-weight:800;">☁ Backend · 24h monitoring active</span>`
      :`<span class="pill warn" style="font-size:9px;">⚡ Direct · <a href="#" id="p_setup_link" style="color:inherit;">Connect backend →</a></span>`}
    ${spread!==null?`<span class="pill warn" style="font-weight:700;">Spread ${fmtP(spread)} (${spreadPct?.toFixed(2)}%)</span>`:""}
    ${p2p.sellAvg&&wacop?`<span class="pill ${sellIsGood?"good":"warn"}">${sellIsGood?"✓ Sell zone":"⏳ Below target"}</span>`:""}
  </div>

  <!-- KPI STRIP -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px;">
    <div class="card" style="padding:12px;">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Best Sell</div>
      <div style="font-size:20px;font-weight:900;color:var(--good);">${p2p.bestSell?fmtP(p2p.bestSell):"-"}</div>
      <div style="font-size:9px;color:var(--muted);">Top offer QAR</div>
    </div>
    <div class="card" style="padding:12px;">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Sell Avg (top 5)</div>
      <div style="font-size:20px;font-weight:900;color:var(--good);">${p2p.sellAvg?fmtP(p2p.sellAvg):"-"}</div>
      ${wacop?`<div style="font-size:9px;font-weight:700;color:var(--${p2p.sellAvg&&p2p.sellAvg>wacop?"good":"bad"});">${p2p.sellAvg?(((p2p.sellAvg-wacop)/wacop*100)>=0?"+":"")+((p2p.sellAvg-wacop)/wacop*100).toFixed(2)+"% vs Av Price":""}</div>`:``}
    </div>
    <div class="card" style="padding:12px;">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Best Restock</div>
      <div style="font-size:20px;font-weight:900;color:var(--bad);">${p2p.bestBuy?fmtP(p2p.bestBuy):"-"}</div>
      ${wacop?`<div style="font-size:9px;font-weight:700;color:var(--${restockIsGood?"good":"warn"});">${p2p.buyAvg?(restockIsGood?"✓ Below Av Price":"Above Av Price"):""}</div>`:""}
    </div>
    <div class="card" style="padding:12px;">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Profit if Sold Now</div>
      <div style="font-size:18px;font-weight:900;color:var(--${profitNow!==null?(profitNow>=0?"good":"bad"):"muted"});">${profitNow!==null?(profitNow>=0?"+":"")+fmtQWithUnit(profitNow):"—"}</div>
      <div style="font-size:9px;color:var(--muted);">${stock>0?fmtU(stock)+" USDT @ market":"No stock"}</div>
    </div>
    ${day?`
    <div class="card" style="padding:12px;">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Today High Sell</div>
      <div style="font-size:18px;font-weight:900;color:var(--good);">${fmtP(day.highSell)}</div>
      <div style="font-size:9px;color:var(--muted);">Low ${fmtP(day.lowSell)} · ${day.polls} polls</div>
    </div>
    <div class="card" style="padding:12px;">
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Today Low Buy</div>
      <div style="font-size:18px;font-weight:900;color:var(--bad);">${fmtP(day.lowBuy)}</div>
      <div style="font-size:9px;color:var(--muted);">High ${fmtP(day.highBuy)}</div>
    </div>`:""}
  </div>

  <!-- MIDDLE ROW: History + Advisor -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div class="panel">
      <div class="panel-head">
        <h2>📈 Price History</h2>
        <span class="pill">${p2p.history.length} pts${usingBackend?" · 24h":"· session"}</span>
      </div>
      <div class="panel-body">
        <div style="margin-bottom:10px;">
          <div style="font-size:9px;font-weight:700;color:var(--muted);margin-bottom:5px;">SELL AVG</div>
          ${mkSpark("sellAvg","good")}
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--muted);margin-bottom:5px;">BUY AVG</div>
          ${mkSpark("buyAvg","bad")}
        </div>
        ${p2p.history.length>=2?(()=>{
          const h=p2p.history,f=h[0],l=h[h.length-1];
          const sd=l.sellAvg&&f.sellAvg?l.sellAvg-f.sellAvg:null;
          const bd=l.buyAvg&&f.buyAvg?l.buyAvg-f.buyAvg:null;
          return`<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
            ${sd!==null?`<span class="pill ${sd>=0?"good":"bad"}" style="font-size:9px;">Sell ${sd>=0?"+":""}${sd.toFixed(3)}</span>`:""}
            ${bd!==null?`<span class="pill ${bd<=0?"good":"warn"}" style="font-size:9px;">Buy ${bd>=0?"+":""}${bd.toFixed(3)}</span>`:""}
          </div>`;
        })():""}
        ${!usingBackend?`<div style="margin-top:10px;padding:8px;border-radius:8px;background:color-mix(in srgb,var(--brand) 8%,transparent);border:1px solid color-mix(in srgb,var(--brand) 20%,transparent);font-size:10px;color:var(--muted);">
          Deploy the backend Worker to get persistent 24h history that survives page reloads.
        </div>`:""}
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>🎯 Position Advisor</h2>
        <span class="pill ${sellIsGood?"good":"warn"}">${!p2p.sellAvg?"No data":sellIsGood?"Sell Zone ✓":"Monitor"}</span>
      </div>
      <div class="panel-body">
        ${!wacop&&!p2p.sellAvg?`<div class="muted" style="font-size:10px;">Add stock batches and refresh P2P to get personalised advice.</div>`:`
        <div style="display:grid;gap:6px;font-size:11px;">
          ${wacop?`
          <div style="display:flex;justify-content:space-between;padding:6px 8px;border-radius:8px;background:var(--panel2);">
            <span style="color:var(--muted);">Your Av Price</span><span class="mono" style="font-weight:700;">${fmtP(wacop)} QAR</span>
          </div>
          ${targetSell?`<div style="display:flex;justify-content:space-between;padding:6px 8px;border-radius:8px;background:var(--panel2);">
            <span style="color:var(--muted);">Target (${targetMargin}% margin)</span><span class="mono" style="font-weight:700;color:var(--brand);">${fmtP(targetSell)} QAR</span>
          </div>`:""}
          `:""}
          ${p2p.sellAvg&&wacop?`<div style="padding:8px;border-radius:8px;background:color-mix(in srgb,var(--${sellIsGood?"good":"warn"}) 10%,transparent);border:1px solid color-mix(in srgb,var(--${sellIsGood?"good":"warn"}) 30%,transparent);">
            <div style="font-weight:800;color:var(--${sellIsGood?"good":"warn"});">${sellIsGood?"✓ Good time to sell":"⏳ Hold — below target"}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px;">${sellIsGood?`Avg ${fmtP(p2p.sellAvg)} ≥ target ${fmtP(targetSell)}`:`Gap: ${fmtP(targetSell&&p2p.sellAvg?targetSell-p2p.sellAvg:0)} · need ${fmtP(targetSell)}`}</div>
          </div>`:""}
          ${p2p.buyAvg&&wacop?`<div style="padding:8px;border-radius:8px;background:color-mix(in srgb,var(--${restockIsGood?"good":"warn"}) 10%,transparent);border:1px solid color-mix(in srgb,var(--${restockIsGood?"good":"warn"}) 30%,transparent);">
            <div style="font-weight:800;color:var(--${restockIsGood?"good":"warn"});">${restockIsGood?"✓ Good restock opportunity":"⚠ Restock above Av Price"}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:3px;">${restockIsGood?`Buy avg ${fmtP(p2p.buyAvg)} < Av Price — improves cost base`:`Would raise avg cost`}</div>
          </div>`:""}
        </div>`}
        <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
          ${p2p.sellAvg?`<button class="btn" id="p_apply_sell" style="flex:1;">Apply Sell Rate</button>`:""}
          ${p2p.buyAvg?`<button class="btn secondary" id="p_apply_buy" style="flex:1;">Apply Buy Rate</button>`:""}
        </div>
      </div>
    </div>
  </div>

  <!-- OFFER TABLES -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div class="panel">
      <div class="panel-head"><h2 style="color:var(--good);">↑ Sell Offers</h2><span class="pill good">Highest first · ✓ fits your stock</span></div>
      <div class="panel-body" style="padding:0;">${mkOfferTable(p2p.sellOffers,"sell")}</div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2 style="color:var(--bad);">↓ Restock Offers</h2><span class="pill bad">Cheapest first · ✓ fits your cash</span></div>
      <div class="panel-body" style="padding:0;">${mkOfferTable(p2p.buyOffers,"buy")}</div>
    </div>
  </div>

  <!-- CALCULATOR -->
  <div class="panel">
    <div class="panel-head"><h2>🧮 Calculator</h2>
      <div style="display:flex;gap:4px;">
        ${["sell","buy","margin"].map(m=>`<button class="rowBtn" data-calcmode="${m}" style="${calcMode===m?"background:var(--brand3);border-color:var(--brand);color:var(--brand);":""}">${m==="sell"?"Sell":m==="buy"?"Buy":"Target"}</button>`).join("")}
      </div>
    </div>
    <div class="panel-body">
      ${calcMode==="sell"?`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div class="field"><div class="label">USDT to sell</div><input class="input" id="c_usdt" inputmode="decimal" placeholder="${stock>0?stock.toFixed(2):"500"}"/></div>
          <div class="field"><div class="label">Sell rate QAR <button class="rowBtn" id="c_fill_sell" style="font-size:9px;padding:1px 5px;margin-left:4px;">Use avg</button></div><input class="input" id="c_rate" inputmode="decimal" placeholder="${p2p.sellAvg?p2p.sellAvg.toFixed(2):"3.65"}"/></div>
        </div>
        <div id="c_out" class="muted" style="font-size:11px;">Enter amount and rate</div>
        <button class="btn" id="c_use_sell" style="margin-top:8px;">Use Rate in Orders →</button>
      `:""}
      ${calcMode==="buy"?`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div class="field"><div class="label">QAR to spend</div><input class="input" id="c_qar" inputmode="decimal" placeholder="${cash>0?fmtQ(cash):"1000"}"/></div>
          <div class="field"><div class="label">Buy rate <button class="rowBtn" id="c_fill_buy" style="font-size:9px;padding:1px 5px;margin-left:4px;">Use avg</button></div><input class="input" id="c_brate" inputmode="decimal" placeholder="${p2p.buyAvg?p2p.buyAvg.toFixed(2):"3.60"}"/></div>
        </div>
        <div id="c_out" class="muted" style="font-size:11px;">Enter QAR and rate</div>
      `:""}
      ${calcMode==="margin"?`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
          <div class="field"><div class="label">Buy price (Av Price)</div><input class="input" id="c_buy_px" value="${wacop?wacop.toFixed(4):""}"/></div>
          <div class="field"><div class="label">Target margin %</div><input class="input" id="c_mpct" value="${targetMargin}"/></div>
          <div class="field"><div class="label">Amount USDT</div><input class="input" id="c_musdt" value="${stock>0?stock.toFixed(0):""}"/></div>
        </div>
        <div id="c_out" class="muted" style="font-size:11px;">Enter values above</div>
      `:""}
    </div>
  </div>`;

  // ── Wire events ──────────────────────────────────────────────────
  $("#p_refresh")?.addEventListener("click",refreshP2P);
  $("#p_setup_link")?.addEventListener("click",e=>{e.preventDefault();toast("Set P2P_API_URL in frontend/index.html after deploying the Worker","warn");});
  $("#p_apply_sell")?.addEventListener("click",()=>{if(p2p.sellAvg){navTo("orders");setTimeout(()=>{if($("#t_sell")){$("#t_sell").value=p2p.sellAvg.toFixed(2);updateSalePreview();}},80);}});
  $("#p_apply_buy")?.addEventListener("click",()=>{if(p2p.buyAvg){toast(`Restock rate ${fmtP(p2p.buyAvg)} — navigate to Stock to add batch`,"good");navTo("stock");}});
  document.querySelectorAll("[data-calcmode]").forEach(b=>b.addEventListener("click",()=>{p2p._calcMode=b.dataset.calcmode;renderP2P();}));

  if(calcMode==="sell"){
    if(p2p.sellAvg&&$("#c_rate"))$("#c_rate").value=p2p.sellAvg.toFixed(2);
    if(stock>0&&$("#c_usdt"))$("#c_usdt").value=stock.toFixed(2);
    const upd=()=>{const u=num($("#c_usdt")?.value),r=num($("#c_rate")?.value);const out=$("#c_out");if(!out)return;if(u>0&&r>0){const gross=u*r,net=wacop?gross-(u*wacop):null,mgn=wacop?(r-wacop)/wacop*100:null;out.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;"><span class="pill">${fmtU(u)} × ${fmtP(r)} = <strong>${fmtQWithUnit(gross)}</strong></span>${net!==null?`<span class="pill ${net>=0?"good":"bad"}">${net>=0?"+":""}${fmtQ(net)} profit</span>`:""} ${mgn!==null?`<span class="pill ${mgn>=0?"good":"bad"}">${mgn>=0?"+":""}${mgn.toFixed(2)}% margin</span>`:""}</div>`;}else{out.textContent="Enter amount and rate";}};
    ["c_usdt","c_rate"].forEach(id=>document.getElementById(id)?.addEventListener("input",upd));
    $("#c_fill_sell")?.addEventListener("click",()=>{if(p2p.sellAvg&&$("#c_rate")){$("#c_rate").value=p2p.sellAvg.toFixed(2);upd();}});
    $("#c_use_sell")?.addEventListener("click",()=>{if(p2p.sellAvg){navTo("orders");setTimeout(()=>{if($("#t_sell")){$("#t_sell").value=p2p.sellAvg.toFixed(2);updateSalePreview();}},80);}});
    upd();
  }
  if(calcMode==="buy"){
    if(p2p.buyAvg&&$("#c_brate"))$("#c_brate").value=p2p.buyAvg.toFixed(2);
    if(cash>0&&$("#c_qar"))$("#c_qar").value=cash.toFixed(0);
    const upd=()=>{const q=num($("#c_qar")?.value),r=num($("#c_brate")?.value);const out=$("#c_out");if(!out)return;if(q>0&&r>0){const usdt=q/r,nw=wacop&&stock>0?((stock*wacop)+(usdt*r))/(stock+usdt):r;out.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;"><span class="pill">${fmtQ(q)} ÷ ${fmtP(r)} = <strong>${fmtU(usdt)} USDT</strong></span>${wacop&&stock>0?`<span class="pill warn">New Av Price: ${fmtP(nw)}</span>`:""}</div>`;}else{out.textContent="Enter QAR and rate";}};
    ["c_qar","c_brate"].forEach(id=>document.getElementById(id)?.addEventListener("input",upd));
    $("#c_fill_buy")?.addEventListener("click",()=>{if(p2p.buyAvg&&$("#c_brate")){$("#c_brate").value=p2p.buyAvg.toFixed(2);upd();}});
    upd();
  }
  if(calcMode==="margin"){
    const upd=()=>{const bp=num($("#c_buy_px")?.value),mp=num($("#c_mpct")?.value),mu=num($("#c_musdt")?.value);const out=$("#c_out");if(!out)return;if(bp>0&&mp>0){const need=bp*(1+mp/100),vs=p2p.sellAvg?p2p.sellAvg-need:null,profit=mu>0?mu*(need-bp):null;out.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;"><span class="pill brand">Need ${fmtP(need)} QAR for ${mp}% margin</span>${vs!==null?`<span class="pill ${vs>=0?"good":"warn"}">${vs>=0?"✓ "+fmtP(Math.abs(vs))+" above target":"⚠ "+fmtP(Math.abs(vs))+" below"}</span>`:""} ${profit!==null?`<span class="pill good">+${fmtQWithUnit(profit)} profit</span>`:""}</div>`;}else{out.textContent="Enter buy price and target margin";}};
    ["c_buy_px","c_mpct","c_musdt"].forEach(id=>document.getElementById(id)?.addEventListener("input",upd));
    upd();
  }
}

// ── CALENDAR ──────────────────────────────────────────────────────
function renderCalendar(){
  setHeader("Trade Calendar","Visual daily trading activity view");
  const {year,month,selectedDay}=state.cal;
  const mn=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dn=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const now=new Date(),curY=now.getFullYear(),curM=now.getMonth(),curD=now.getDate();
  const daysInM=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();

  // Build month data
  const mData={};
  for(let d=1;d<=daysInM;d++)mData[d]={profit:0,trades:0,volumeQAR:0,wins:0,losses:0,marginSum:0,tradeList:[]};
  for(const t of state.trades.filter(t=>!t.voided)){
    const dt=new Date(t.ts);
    if(dt.getFullYear()===year&&dt.getMonth()===month){
      const c=derived.tradeCalc.get(t.id);
      const d2=dt.getDate();
      if(c?.ok){const rev=t.amountUSDT*t.sellPriceQAR;mData[d2].profit+=c.netQAR;mData[d2].volumeQAR+=rev;mData[d2].trades++;mData[d2].marginSum+=Number.isFinite(c.margin)?c.margin:0;(c.netQAR>=0?mData[d2].wins++:mData[d2].losses++);mData[d2].tradeList.push({...t,net:c.netQAR,margin:c.margin,avgBuy:c.avgBuyQAR,rev});}
    }
  }
  const totalP=Object.values(mData).reduce((s,d)=>s+d.profit,0);
  const totalT=Object.values(mData).reduce((s,d)=>s+d.trades,0);
  const totalV=Object.values(mData).reduce((s,d)=>s+d.volumeQAR,0);
  const wins=Object.values(mData).reduce((s,d)=>s+d.wins,0);
  const tradeDays=Object.values(mData).filter(d=>d.trades>0).length;
  const bestDay=Object.entries(mData).filter(([,d])=>d.trades>0).sort((a,b)=>b[1].profit-a[1].profit)[0];
  const worstDay=Object.entries(mData).filter(([,d])=>d.trades>0).sort((a,b)=>a[1].profit-b[1].profit)[0];
  const avgMargin=totalT?Object.values(mData).reduce((s,d)=>s+d.marginSum,0)/totalT:0;
  const winRate=totalT?(wins/totalT):0;
  const checkIds=["c1","c2","c3","c4","c5","c6"];
  const dayChecks={};
  for(let d=1;d<=daysInM;d++){
    const key=new Date(year,month,d).toLocaleDateString();
    const done=state.checksDone&&state.checksDone[key]?state.checksDone[key]:{};
    const cnt=checkIds.filter(id=>done[id]).length;
    dayChecks[d]=cnt;
  }
  const selData=selectedDay?mData[selectedDay]:null;

  // Calendar grid
  let calHtml=`<div class="cal-grid">${dn.map(d=>`<div class="cal-hdr">${d}</div>`).join("")}`;
  for(let i=0;i<firstDay;i++)calHtml+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInM;d++){
    const data=mData[d],hasP=data.profit>0,hasL=data.profit<0,isTdy=d===curD&&year===curY&&month===curM,isSel=d===selectedDay;
    calHtml+=`<div class="cal-day${hasP?" has-profit":hasL?" has-loss":""}${isTdy?" today":""}${isSel?" selected":""}" onclick="selectCalDay(${d})">
      <div class="cal-num">${d}</div>
      ${dayChecks[d]===checkIds.length?`<div class="cal-flag good">✓</div>`:dayChecks[d]>0?`<div class="cal-flag partial">•</div>`:""}
      ${data.trades>0?`<div class="cal-profit ${hasP?"good":"bad"}">${(data.profit>=0?"+":"")+fmtQ(data.profit)}</div><div class="cal-count">${data.trades}t</div>`:""}
    </div>`;
  }
  calHtml+=`</div>`;

  // Selected day detail
  let detailHtml="";
  if(selectedDay&&selData&&selData.trades>0){
    detailHtml=`<div class="cal-detail">
      <div style="font-size:calc(12px * var(--ui-scale,1));font-weight:800;margin-bottom:8px;">📅 ${mn[month]} ${selectedDay}, ${year} — ${selData.trades} trade${selData.trades!==1?"s":""} · Vol ${fmtQWithUnit(selData.volumeQAR)} · Net ${(selData.profit>=0?"+":"")+fmtQ(selData.profit)} QAR · Win ${(selData.trades?((selData.wins/selData.trades)*100).toFixed(0):"0")}%</div>
      <div class="tableWrap"><table><thead><tr><th>Time</th><th class="r">Qty</th><th class="r">Avg Buy</th><th class="r">Sell</th><th class="r">Volume</th><th class="r">Net</th><th class="r">Margin</th></tr></thead>
      <tbody>${selData.tradeList.map(t=>`<tr><td class="mono">${new Date(t.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</td><td class="mono r">${fmtU(t.amountUSDT)}</td><td class="mono r" style="color:var(--bad)">${fmtP(t.avgBuy)}</td><td class="mono r" style="color:var(--good)">${fmtP(t.sellPriceQAR)}</td><td class="mono r">${fmtQ(t.rev)}</td><td class="mono r" style="color:${t.net>=0?"var(--good)":"var(--bad)"};font-weight:700;">${(t.net>=0?"+":"")+fmtQ(t.net)}</td><td class="mono r" style="color:${t.margin>=1?"var(--good)":t.margin<0?"var(--bad)":"var(--warn)"}">${fmtPct(t.margin)}</td></tr>`).join("")}</tbody></table></div>
    </div>`;
  }else if(selectedDay){
    detailHtml=`<div class="cal-detail"><div class="muted" style="font-size:calc(11px * var(--ui-scale,1));padding:8px 0;">No trades on ${mn[month]} ${selectedDay}. <button class="rowBtn" onclick="navTo('ledger')">Log a trade</button></div></div>`;
  }

  $("#pageBody").innerHTML=`
    <div class="cal-stats">
      <div class="cal-stat"><div class="kpi-lbl">Monthly Profit</div><div class="kpi-val ${totalP>=0?"good":"bad"}">${(totalP>=0?"+":"")+fmtQ(totalP)} QAR</div></div>
      <div class="cal-stat"><div class="kpi-lbl">Total Trades</div><div class="kpi-val">${totalT}</div></div>
      <div class="cal-stat"><div class="kpi-lbl">Trading Days</div><div class="kpi-val">${tradeDays}${bestDay?` <span class="cycle-badge">Best: ${mn[month].slice(0,3)} ${bestDay[0]}</span>`:""}${worstDay?` <span class="cycle-badge">Worst: ${mn[month].slice(0,3)} ${worstDay[0]}</span>`:""}</div></div>
      <div class="cal-stat"><div class="kpi-lbl">Monthly Volume</div><div class="kpi-val">${fmtQWithUnit(totalV)}</div></div>
      <div class="cal-stat"><div class="kpi-lbl">Win Rate</div><div class="kpi-val">${(winRate*100).toFixed(0)}%</div></div>
      <div class="cal-stat"><div class="kpi-lbl">Avg Margin</div><div class="kpi-val">${fmtPct(avgMargin)}</div></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <h2>${mn[month]} ${year}</h2>
        <div style="display:flex;gap:6px;">
          <button class="btn secondary" id="cal_prev">← Prev</button>
          <button class="btn secondary" id="cal_today">Today</button>
          <button class="btn secondary" id="cal_next">Next →</button>
        </div>
      </div>
      <div class="panel-body">${calHtml}</div>
    </div>
    ${detailHtml}`;

  $("#cal_prev")?.addEventListener("click",()=>{let{year:y,month:m}=state.cal;m--;if(m<0){m=11;y--;}state.cal={year:y,month:m,selectedDay:null};save();renderCalendar();});
  $("#cal_next")?.addEventListener("click",()=>{let{year:y,month:m}=state.cal;m++;if(m>11){m=0;y++;}state.cal={year:y,month:m,selectedDay:null};save();renderCalendar();});
  $("#cal_today")?.addEventListener("click",()=>{state.cal={year:new Date().getFullYear(),month:new Date().getMonth(),selectedDay:null};save();renderCalendar();});
}
window.selectCalDay=d=>{state.cal.selectedDay=state.cal.selectedDay===d?null:d;save();renderCalendar();};

var _crmView = "pipeline"; // pipeline | list | suppliers

function renderCRM() {
  setHeader("CRM", "Trade Pipeline · Customer Intel · Supplier Network");
  var q = (state.q || "").trim().toLowerCase();

  // ── Tier config
  var TIER = {
    A: { label:"VIP Client", color:"#16a34a", bg:"rgba(22,163,74,.1)", border:"rgba(22,163,74,.3)", icon:"♛" },
    B: { label:"Verified",   color:"#2563eb", bg:"rgba(37,99,235,.1)",  border:"rgba(37,99,235,.3)",  icon:"✦" },
    C: { label:"Standard",   color:"#d97706", bg:"rgba(217,119,6,.1)",  border:"rgba(217,119,6,.3)",  icon:"◎" },
    D: { label:"Watch",      color:"#dc2626", bg:"rgba(220,38,38,.1)",  border:"rgba(220,38,38,.3)",  icon:"⚠" },
  };

  // ── Supplier map
  state.suppliers = Array.isArray(state.suppliers) ? state.suppliers : [];
  var suppMap = {};

  // From batches (auto)
  for (var i = 0; i < state.batches.length; i++) {
    var b = state.batches[i];
    var sn = (b.source || "").trim();
    if (!sn) continue;
    if (!suppMap[sn]) suppMap[sn] = { name:sn, usdt:0, batches:0, prices:[], lastTs:0, spent:0, phone:"", typicalPrice:0 };
    suppMap[sn].usdt += b.initialUSDT;
    suppMap[sn].batches++;
    if (isFinite(b.buyPriceQAR)) suppMap[sn].prices.push(b.buyPriceQAR);
    suppMap[sn].spent += b.initialUSDT * b.buyPriceQAR;
    if (b.ts > suppMap[sn].lastTs) suppMap[sn].lastTs = b.ts;
  }

  // From manual suppliers (always show them in CRM even with no batches)
  for (var si = 0; si < state.suppliers.length; si++) {
    var sr = state.suppliers[si] || {};
    var sn2 = String(sr.name || "").trim();
    if (!sn2) continue;
    if (!suppMap[sn2]) suppMap[sn2] = { name:sn2, usdt:0, batches:0, prices:[], lastTs:0, spent:0, phone:"", typicalPrice:0 };
    if (sr.phone && !suppMap[sn2].phone) suppMap[sn2].phone = String(sr.phone);
    var tp = num(sr.typicalPrice, 0);
    if (tp > 0) suppMap[sn2].typicalPrice = tp;
    // If there are no batch prices, seed with typicalPrice for a meaningful avg.
    if (!suppMap[sn2].prices.length && suppMap[sn2].typicalPrice > 0) suppMap[sn2].prices.push(suppMap[sn2].typicalPrice);
  }

  var suppList = Object.values(suppMap).sort(function(a,b){
    if (b.usdt !== a.usdt) return b.usdt - a.usdt;
    if (b.batches !== a.batches) return b.batches - a.batches;
    return String(a.name).localeCompare(String(b.name));
  });
  suppList.forEach(function(s){
    s.avg = s.prices.length ? (s.prices.reduce(function(a,v){return a+v;},0)/s.prices.length) : (s.typicalPrice || 0);
  });

  // ── Customer stats
  function custStat(cu) {
    var trades = state.trades.filter(function(t){return !t.voided && t.customerId===cu.id;});
    var vol = trades.reduce(function(s,t){return s+t.amountUSDT;},0);
    var net = trades.reduce(function(s,t){var cc=derived.tradeCalc.get(t.id);return s+(cc&&cc.ok?cc.netQAR:0);},0);
    var lastTrade = trades.length ? trades.reduce(function(a,b){return a.ts>b.ts?a:b;}) : null;
    var avgSell = trades.length ? trades.reduce(function(s,t){return s+t.sellPriceQAR;},0)/trades.length : 0;
    return { count:trades.length, vol:vol, net:net, avgSell:avgSell,
      lastDate:lastTrade?new Date(lastTrade.ts).toLocaleDateString("en-GB",{day:"2-digit",month:"short"}):"—" };
  }

  // ── Filter customers
  var custs = state.customers.filter(function(cu){
    if (!q) return true;
    return (cu.name+cu.phone+cu.notes+cu.tier).toLowerCase().indexOf(q) >= 0;
  });

  // ── Portfolio KPIs
  var totalVol = 0, totalNet = 0, totalTrades = 0;
  state.customers.forEach(function(cu){ var s=custStat(cu); totalVol+=s.vol; totalNet+=s.net; totalTrades+=s.count; });
  var byTier = {A:0,B:0,C:0,D:0};
  state.customers.forEach(function(cu){ byTier[cu.tier]=(byTier[cu.tier]||0)+1; });

  // ─── PIPELINE VIEW ─────────────────────────────────────────────
  function buildPipeline() {
    var cols = {A:[], B:[], C:[], D:[]};
    custs.forEach(function(cu){
      var t = cu.tier || "C";
      if (cols[t]) cols[t].push(cu);
    });

    function card(cu) {
      var s = custStat(cu);
      var tier = TIER[cu.tier] || TIER.C;
      var profitSign = s.net >= 0 ? "+" : "";
      return "<div class='crm-card' data-cuid='"+esc(cu.id)+"' style='border-top:3px solid "+tier.color+";'>" +
        "<div style='display:flex;justify-content:space-between;align-items:flex-start;gap:8px;'>" +
          "<div style='min-width:0;'>" +
            "<div style='font-weight:800;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'>"+esc(cu.name)+"</div>" +
            "<div style='font-size:9px;color:var(--muted);margin-top:1px;'>"+esc(cu.phone||"No contact")+"</div>" +
          "</div>" +
          "<span style='font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;background:"+tier.bg+";color:"+tier.color+";border:1px solid "+tier.border+";white-space:nowrap;'>"+tier.icon+" "+esc(cu.tier)+"</span>" +
        "</div>" +
        "<div style='display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:8px 0;'>" +
          "<div style='text-align:center;background:var(--panel2);border-radius:5px;padding:5px 2px;'><div style='font-size:7px;font-weight:700;text-transform:uppercase;color:var(--muted);'>Trades</div><div style='font-weight:800;font-size:14px;'>"+s.count+"</div></div>" +
          "<div style='text-align:center;background:var(--panel2);border-radius:5px;padding:5px 2px;'><div style='font-size:7px;font-weight:700;text-transform:uppercase;color:var(--muted);'>USDT</div><div style='font-weight:800;font-size:11px;'>"+fmtU(s.vol,0)+"</div></div>" +
          "<div style='text-align:center;background:var(--panel2);border-radius:5px;padding:5px 2px;'><div style='font-size:7px;font-weight:700;text-transform:uppercase;color:var(--muted);'>P&L</div><div style='font-weight:800;font-size:11px;color:"+(s.net>=0?"var(--good)":"var(--bad)")+"'>"+profitSign+fmtQ(s.net)+"</div></div>" +
        "</div>" +
        (s.lastDate !== "—" ? "<div style='font-size:9px;color:var(--muted);margin-bottom:8px;'>Last: "+s.lastDate+(cu.dailyLimitUSDT>0?"  ·  Limit "+fmtU(cu.dailyLimitUSDT,0)+" USDT":"")+"</div>" : "") +
        (cu.notes ? "<div style='font-size:9px;color:var(--muted);background:var(--panel2);border-radius:5px;padding:4px 6px;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;' title='"+esc(cu.notes)+"'>"+esc(cu.notes)+"</div>" : "") +
        "<div style='display:flex;gap:4px;'>" +
          "<button class='rowBtn crm-edit-btn' data-cuid='"+esc(cu.id)+"' style='flex:1;font-size:9px;padding:3px 0;'>Edit</button>" +
          "<button class='rowBtn crm-promote-btn' data-cuid='"+esc(cu.id)+"' title='Promote tier' style='font-size:9px;padding:3px 6px;color:var(--good);border-color:var(--good);'>▲</button>" +
          "<button class='rowBtn crm-demote-btn' data-cuid='"+esc(cu.id)+"' title='Demote tier' style='font-size:9px;padding:3px 6px;color:var(--bad);border-color:var(--bad);'>▼</button>" +
          "<button class='rowBtn crm-del-btn' data-cuid='"+esc(cu.id)+"' style='font-size:9px;padding:3px 6px;color:var(--bad);border-color:var(--bad);'>✕</button>" +
        "</div>" +
      "</div>";
    }

    var html = "<div class='crm-pipeline'>";
    ["A","B","C","D"].forEach(function(t) {
      var tier = TIER[t];
      html += "<div class='crm-col'>" +
        "<div class='crm-col-head' style='border-color:"+tier.color+";'>" +
          "<span style='font-weight:800;font-size:11px;color:"+tier.color+"'>"+tier.icon+" "+t+" · "+tier.label+"</span>" +
          "<span style='font-size:9px;background:"+tier.bg+";color:"+tier.color+";border:1px solid "+tier.border+";border-radius:999px;padding:1px 6px;'>"+cols[t].length+"</span>" +
        "</div>" +
        "<div class='crm-cards'>" +
          (cols[t].length ? cols[t].map(card).join("") : "<div style='text-align:center;padding:20px 8px;color:var(--muted);font-size:10px;border:1px dashed var(--line);border-radius:8px;'>No "+tier.label+" clients</div>") +
        "</div>" +
      "</div>";
    });
    html += "</div>";
    return html;
  }

  // ─── LIST VIEW ─────────────────────────────────────────────────
  function buildList() {
    if (!custs.length) return "<div style='text-align:center;padding:60px;color:var(--muted);'><div style='font-size:40px'>👤</div><div style='font-weight:800;margin-top:10px;'>No customers</div><div style='font-size:11px;margin-top:4px;'>Add your first customer using the form →</div></div>";
    var sorted = custs.slice().sort(function(a,b){return custStat(b).vol - custStat(a).vol;});
    var rows = sorted.map(function(cu){
      var s = custStat(cu); var tier = TIER[cu.tier]||TIER.C;
      return "<tr>" +
        "<td style='font-weight:700;'>"+esc(cu.name)+(cu.phone?"<div style='font-size:9px;color:var(--muted);'>"+esc(cu.phone)+"</div>":"")+"</td>" +
        "<td><span style='padding:2px 7px;border-radius:999px;font-size:9px;font-weight:800;background:"+tier.bg+";color:"+tier.color+";border:1px solid "+tier.border+"'>"+tier.icon+" "+cu.tier+"</span></td>" +
        "<td class='mono'>"+s.count+"</td>" +
        "<td class='mono'>"+fmtU(s.vol,0)+"</td>" +
        "<td class='mono' style='color:"+(s.net>=0?"var(--good)":"var(--bad)")+"'>"+(s.net>=0?"+":"")+fmtQ(s.net)+"</td>" +
        "<td class='mono' style='font-size:9px;color:var(--muted);'>"+s.lastDate+"</td>" +
        "<td>" +
          "<div style='display:flex;gap:3px;'><button class='rowBtn crm-edit-btn' data-cuid='"+esc(cu.id)+"'>Edit</button><button class='rowBtn crm-del-btn' data-cuid='"+esc(cu.id)+"' style='color:var(--bad);border-color:var(--bad);'>✕</button></div>" +
        "</td>" +
      "</tr>";
    }).join("");
    return "<div class='panel'><table><thead><tr><th>Customer</th><th>Tier</th><th>Trades</th><th>USDT Vol</th><th>Net P&L</th><th>Last Trade</th><th>Action</th></tr></thead><tbody>"+rows+"</tbody></table></div>";
  }

  // ─── SUPPLIERS VIEW ────────────────────────────────────────────
  function buildSuppliers() {
    if (!suppList.length) return "<div style='text-align:center;padding:60px;color:var(--muted);'><div style='font-size:40px'>🏭</div><div style='font-weight:800;margin-top:10px;'>No suppliers yet</div><div style='font-size:11px;margin-top:4px;'>Supplier profiles auto-generate from Stock batch entries.</div></div>";
    var topUsdt = suppList.reduce(function(max,s){return s.usdt>max?s.usdt:max;},0);
    var cards = suppList.map(function(s){
      var barPct = topUsdt>0?Math.round(s.usdt/topUsdt*100):0;
      return "<div style='background:var(--card-bg);border:1px solid var(--line);border-radius:var(--lt-radius);padding:14px;'>" +
        "<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;'>" +
          "<div style='font-weight:800;font-size:13px;'>"+esc(s.name)+"</div>" +
          "<span class='pill'>"+s.batches+" batch"+( s.batches!==1?"es":"")+"</span>" +
        "</div>" +

function editCustomer(id){

  var tierOpts=["A","B","C","D"].map(function(k){return "<option value='"+k+"'"+(cu.tier===k?" selected":"")+">"+k+" – "+{A:"VIP Client",B:"Verified",C:"Standard",D:"Watch"}[k]+"</option>";}).join("");
  openModal("Edit Customer",
    "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;'>" +
      "<div class='form-field'><label class='form-label'>Name</label><input id='ec_n' class='inp-field' value='"+esc(cu.name)+"'/></div>" +
      "<div class='form-field'><label class='form-label'>Phone</label><input id='ec_p' class='inp-field' value='"+esc(cu.phone||"")+"'/></div>" +
      "<div class='form-field' style='grid-column:span 2'><label class='form-label'>Tier</label><select id='ec_t' class='inp-field'>"+tierOpts+"</select></div>" +
    "</div>",
    "<button class='btn secondary' id='m_c'>Cancel</button><button class='btn' id='m_s'>Save</button>"
  );
  setTimeout(function(){
    var mc=document.getElementById("m_c");if(mc)mc.addEventListener("click",closeModal);

      cu.tier=(document.getElementById("ec_t")||{}).value||cu.tier;
      saveRecompute("Updated","good");closeModal();
    });
  },0);

function editSupplier(suppname){
  var supp = (state.suppliers||[]).find(function(s){return s.name===suppname;}) || {name:suppname,phone:"",typicalPrice:0};
  openModal("Edit Supplier",
    "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;'>" +
      "<div class='form-field'><label class='form-label'>Supplier Name</label><input id='es_n' class='inp-field' value='"+esc(supp.name)+"'/></div>" +
      "<div class='form-field'><label class='form-label'>Phone</label><input id='es_p' class='inp-field' value='"+esc(supp.phone||"")+"'/></div>" +
      "<div class='form-field' style='grid-column:span 2'><label class='form-label'>Typical Price (QAR)</label><input id='es_tp' class='inp-field' inputmode='decimal' value='"+(supp.typicalPrice||"")+"'/></div>" +
    "</div>",
    "<button class='btn secondary' id='m_c'>Cancel</button><button class='btn' id='m_s'>Save</button>"
  );
  setTimeout(function(){
    var mc=document.getElementById("m_c");if(mc)mc.addEventListener("click",closeModal);
    var ms=document.getElementById("m_s");if(ms)ms.addEventListener("click",function(){
      var newName=((document.getElementById("es_n")||{}).value||"").trim()||supp.name;
      var oldName=supp.name;
      supp.name=newName;
      supp.phone=((document.getElementById("es_p")||{}).value||"").trim();
      supp.typicalPrice=num(document.getElementById("es_tp")?.value,0);
      
      // Ensure supplier is in state
      if(!state.suppliers)state.suppliers=[];
      var idx=state.suppliers.findIndex(function(s){return s.name===oldName;});
      if(idx>=0){
        state.suppliers[idx]=supp;
      }else{
        state.suppliers.push(supp);
      }
      saveRecompute("Supplier updated","good");closeModal();
    });
  },0);
}

function deleteSupplier(suppname){
  openModal("Delete Supplier","<div class='msg warn'>Supplier profile will be removed. Historical batch data remains.</div>",
    "<button class='btn secondary' id='m_c'>Cancel</button><button class='btn' style='background:var(--bad);' id='m_d'>Delete</button>");
  setTimeout(function(){
    var mc=document.getElementById("m_c");if(mc)mc.addEventListener("click",closeModal);
    var md=document.getElementById("m_d");if(md)md.addEventListener("click",function(){
      state.suppliers=(state.suppliers||[]).filter(function(s){return s.name!==suppname;});
      saveRecompute("Supplier deleted","warn");closeModal();
    });
  },0);
}

      document.getElementById("sys_logs_clear")?.addEventListener("click", function(){ if(!confirm("Clear client logs?"))return; window._logBuf=[]; if(typeof window._saveLogs==="function") window._saveLogs(); toast("Cleared","warn"); var ct2=document.getElementById("sys_logs_count"); if(ct2) ct2.textContent="0"; });
    }
  }catch(e){}
}

  });

  if(badge){badge.textContent=`${checkIds.length}/${checkIds.length} done today`;badge.className="pill good";}

const DB_FILENAME = "taheito-cloud-db.json";

}

function doPost(e) {
  let body = {};
  try { body = JSON.parse((e && e.postData && e.postData.contents) || "{}"); }
  catch (err) { return jsonOut_({ ok: false, error: "Invalid JSON" }); }

  const action = String(body.action || "").toLowerCase();
  if (!action) return jsonOut_({ ok: false, error: "Missing action" });

    if (action === "register") return handleRegister_(db, body);
    if (action === "login") return handleLogin_(db, body);

function handleRegister_(db, body) {
  const email = normEmail_(body.email);
  const name = String(body.name || "").trim() || email.split("@")[0];
  const password = String(body.password || "");

  if (!email || email.indexOf("@") === -1) return jsonOut_({ ok: false, error: "Invalid email" });
  if (password.length < 6) return jsonOut_({ ok: false, error: "Password too short" });
  if (db.users[email]) return jsonOut_({ ok: false, error: "User already exists" });

  const salt = Utilities.getUuid();
  const pwHash = sha256b64_(salt + ":" + password);

  db.users[email] = {
    email: email,
    name: name,
    salt: salt,
    pwHash: pwHash,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };

  db.data[email] = db.data[email] || { state: {}, exportedAt: null };

  const token = newToken_();
  db.sessions[token] = { email: email, exp: Date.now() + SESSION_TTL_MS };

  writeDb_(db);

  return jsonOut_({
    ok: true,
    token: token,
    user: { email: email, name: name },
    state: db.data[email].state || {},
    exportedAt: db.data[email].exportedAt
  });

function handleLogin_(db, body) {
  const email = normEmail_(body.email);
  const password = String(body.password || "");

  if (!email || email.indexOf("@") === -1) return jsonOut_({ ok: false, error: "Invalid email" });
  const u = db.users[email];
  if (!u) return jsonOut_({ ok: false, error: "User not found" });

  const ok = (sha256b64_(u.salt + ":" + password) === u.pwHash);
  if (!ok) return jsonOut_({ ok: false, error: "Wrong password" });

  const token = newToken_();
  db.sessions[token] = { email: email, exp: Date.now() + SESSION_TTL_MS };
  u.updatedAt = new Date().toISOString();

  db.data[email] = db.data[email] || { state: {}, exportedAt: null };

  writeDb_(db);

  return jsonOut_({
    ok: true,
    token: token,
    user: { email: email, name: u.name || email.split("@")[0] },
    state: db.data[email].state || {},
    exportedAt: db.data[email].exportedAt
  });
}

function handleBackup_(db, body) {
  const email = normEmail_(body.email);
  const token = String(body.token || "");
  requireSession_(db, email, token);

  const state = body.state || {};
  const exportedAt = String(body.exportedAt || new Date().toISOString());

  db.data[email] = { state: state, exportedAt: exportedAt };
  writeDb_(db);

  return jsonOut_({ ok: true, exportedAt: exportedAt });
}

function handleRestore_(db, body) {
  const email = normEmail_(body.email);
  const token = String(body.token || "");
  requireSession_(db, email, token);

  const rec = db.data[email];
  if (!rec) return jsonOut_({ ok: true, state: null, exportedAt: null });

  return jsonOut_({ ok: true, state: rec.state || {}, exportedAt: rec.exportedAt || null });
}

function jsonOut_(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

function getDbFile_() {
  const files = DriveApp.getFilesByName(DB_FILENAME);
  if (files.hasNext()) return files.next();
  return DriveApp.createFile(DB_FILENAME, JSON.stringify({ users:{}, sessions:{}, data:{} }), MimeType.PLAIN_TEXT);
}

function readDb_() {
  const f = getDbFile_();
  let db = { users:{}, sessions:{}, data:{} };
  try { db = JSON.parse(f.getContent() || "{}"); } catch (e) {}
  db.users = db.users || {};
  db.sessions = db.sessions || {};
  db.data = db.data || {};
  return db;
}

function writeDb_(db) {
  const f = getDbFile_();
  f.setContent(JSON.stringify(db));
}

function normEmail_(email) {
  return String(email || "").trim().toLowerCase();
}

function sha256b64_(s) {
  const bytes = Utilities.computeDigest(Utilities.DigestAlgorithm.SHA_256, s, Utilities.Charset.UTF_8);
  return Utilities.base64EncodeWebSafe(bytes);
}

function newToken_() {
  return Utilities.getUuid() + "-" + Utilities.getUuid();
}

function pruneSessions_(db) {
  const now = Date.now();
  Object.keys(db.sessions || {}).forEach(function(t) {
    if (!db.sessions[t] || db.sessions[t].exp <= now) delete db.sessions[t];
  });
}

function requireSession_(db, email, token) {
  if (!token) throw new Error("Missing token");
  const sess = db.sessions[token];
  if (!sess) throw new Error("Invalid session");
  if (sess.exp <= Date.now()) { delete db.sessions[token]; throw new Error("Session expired"); }
  if (sess.email !== email) throw new Error("Session email mismatch");
  return sess;
}
