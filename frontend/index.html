/* Global JS-overridable vars — ONLY on :root so applyLayout/applyLayoutPreview
   can always win via document.documentElement.style.setProperty().
   Previously these were also on [data-layout="flux"] which caused body to
   re-stamp --ui-fs/--ui-scale/--app-font and block JS overrides for every
   non-Cipher layout. */

  --ui-fs: 11px;    /* global font size baseline — overridden by JS */
  --ui-scale: 1;    /* global font scale factor — overridden by JS */
  --app-font: 'Inter', sans-serif; /* overridden by JS */
}
[data-layout="flux"] {
  --lt-font: 'Inter', sans-serif;
  --lt-font-mono: 'JetBrains Mono', monospace;
  --lt-radius: 12px; --lt-radius-sm: 8px; --lt-radius-lg: 16px;

  --lt-sidebar-w: 180px;
  --lt-topbar-h: 54px;

}

/* ═══════════════════════ BASE STYLES ═══════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #app { width: 100vw; height: var(--app-vh, 100dvh); min-height: var(--app-vh, 100dvh); margin: 0; padding: 0; overflow: hidden; }
body {
  font-family: var(--app-font, var(--lt-font, 'Inter', sans-serif));
  background: var(--body-bg, var(--bg));
  color: var(--text);
  transition: background var(--lt-tr), color var(--lt-tr);
}
/* Glass backdrop for lumina */

/* Cipher borders */
[data-layout="cipher"] .card,
[data-layout="cipher"] .panel,
[data-layout="cipher"] .kpi-card { border: 1px solid var(--line) !important; box-shadow: 0 0 0 0 !important; }
[data-layout="cipher"] .card:hover { border-color: var(--brand) !important; box-shadow: 0 0 12px var(--glow) !important; }

/* ── APP SHELL ── */
.app { display: flex; width: 100%; max-width: none; height: var(--app-vh, 100dvh); min-height: var(--app-vh, 100dvh); overflow: hidden; }
.mainWrap { flex: 1; width: 100%; min-width: 0; max-width: none; display: flex; flex-direction: column; height: var(--app-vh, 100dvh); min-height: var(--app-vh, 100dvh); overflow: hidden; }
.container, .dashboard, .main { width: 100%; max-width: none; }
#pageBody{width:100%;min-width:0;max-width:100%;}
#pageBody > *{min-width:0;}
.twoColPage{width:100%;}

/* ── SIDEBAR (slim: 180px) ── */
.sidebar {
  width: var(--lt-sidebar-w, 180px); flex-shrink: 0; height: var(--app-vh, 100dvh); min-height: var(--app-vh, 100dvh);
  overflow-y: auto; overflow-x: hidden;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  position: relative; z-index: 20;
  transition: background var(--lt-tr);
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
.brand {
  padding: 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
}
.logo {
  width: 32px; height: 32px; border-radius: var(--lt-radius-sm); flex-shrink: 0;
  background: var(--kpi-accent, linear-gradient(135deg,var(--brand),var(--brand2)));
  display: grid; place-items: center; box-shadow: 0 4px 12px var(--glow, rgba(0,0,0,.2));
  transition: transform var(--lt-tr), box-shadow var(--lt-tr);
}
.logo:hover { transform: scale(1.08); box-shadow: 0 6px 20px var(--glow); }
.logo svg { width: 16px; height: 16px; }
.brand-name { font-size: calc(12px * var(--ui-scale,1)); font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brand-ver { font-size: calc(9px * var(--ui-scale,1)); color: var(--muted); margin-top: 1px; font-family: var(--app-font, var(--lt-font-mono)); }
.nav { padding: 6px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
.navBtn {
  width: 100%; display: flex; align-items: center; gap: 7px; padding: 7px 8px;
  border-radius: var(--lt-radius-sm); border: 1px solid transparent; background: transparent;
  color: var(--muted); cursor: pointer; text-align: left; font-size: calc(11px * var(--ui-scale,1));
  font-family: var(--app-font, var(--lt-font, inherit)); transition: all var(--lt-tr);
  position: relative; overflow: hidden;
}
.navBtn::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--brand); border-radius: 0 2px 2px 0; opacity: 0; transition: opacity var(--lt-tr);
}
.navBtn svg { width: 14px; height: 14px; flex-shrink: 0; transition: color var(--lt-tr); }
.navBtn small { color: var(--muted2); font-size: calc(9px * var(--ui-scale,1)); display: block; margin-top: 1px; }
.navBtn:hover { background: var(--hover-card, rgba(255,255,255,.04)); color: var(--text); border-color: var(--line); transform: translateX(2px); }
.navBtn:hover svg { color: var(--brand); }
.navBtn.active { background: var(--brand3, rgba(99,102,241,.1)); border-color: color-mix(in srgb,var(--brand) 35%,transparent); color: var(--brand); }
.navBtn.active::before { opacity: 1; }
.navBtn.active svg { color: var(--brand); }
.navSec { display: none; }
.sideBanner {
  margin: 0 8px 6px; padding: 8px 10px; border-radius: var(--lt-radius-sm);
  border: 1px solid rgba(239,68,68,.25); background: rgba(239,68,68,.08);

  cursor: pointer; transition: background var(--lt-tr);
}
.sideBanner:hover { background: rgba(239,68,68,.14); }
.sideBanner .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bad); animation: blink 1.4s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.sideFooter {
  }
  #saveSettingsBtn[disabled]{opacity:.55;cursor:not-allowed;}
  #saveSettingsBtn.dirty{box-shadow:0 0 0 2px rgba(79,70,229,.22);}
/* ── SETTINGS TOGGLE SWITCH ── */
.tog-wrap{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;user-select:none;}
.tog-wrap .tog-lbl{flex:1;font-size:calc(11px * var(--ui-scale,1));color:var(--muted);}
.tog-switch{position:relative;width:38px;height:22px;flex-shrink:0;}
.tog-switch input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;border-radius:999px;background:var(--line);border:1px solid var(--line);transition:background .18s,border-color .18s;cursor:pointer;}
.tog-track::after{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transition:left .18s;}
.tog-switch input:checked~.tog-track{background:var(--brand);border-color:var(--brand);}
.tog-switch input:checked~.tog-track::after{left:19px;}

/* ═══════════════════════ TEMPORAL JOURNAL ═══════════════════════
   Time-travel recovery, event timeline, health score UI
══════════════════════════════════════════════════════════════════ */
.tj-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--lt-radius); overflow: hidden; margin-bottom: 10px; }
.tj-head { padding: 10px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; background: linear-gradient(90deg,rgba(255,255,255,.02),transparent); }
.tj-head h2 { margin: 0; font-size: calc(11px * var(--ui-scale,1)); font-weight: 700; }
.tj-body { padding: 12px 14px; }
.tj-timeline { position: relative; height: 48px; margin: 12px 0; }
.tj-tl-bar { position: absolute; top: 50%; left: 0; right: 0; height: 3px; background: var(--line); border-radius: 3px; transform: translateY(-50%); }
.tj-tl-fill { position: absolute; top: 50%; left: 0; height: 3px; background: linear-gradient(90deg,var(--brand2),var(--brand)); border-radius: 3px; transform: translateY(-50%); transition: width .4s; }
.tj-snap-dot { position: absolute; top: 50%; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--brand); background: var(--panel); transform: translate(-50%,-50%); cursor: pointer; transition: all .15s; z-index: 2; }
.tj-snap-dot:hover,.tj-snap-dot.selected { background: var(--brand); box-shadow: 0 0 0 4px var(--brand3); }
.tj-snap-dot.full { border-color: var(--good); }
.tj-snap-dot.full:hover,.tj-snap-dot.full.selected { background: var(--good); box-shadow: 0 0 0 4px rgba(22,163,74,.15); }
.tj-snap-label { position: absolute; top: calc(50% + 10px); font-size: 8px; color: var(--muted2); white-space: nowrap; transform: translateX(-50%); pointer-events: none; }
.tj-event-row { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--line2); font-size: calc(10px * var(--ui-scale,1)); }
.tj-event-row:last-child { border-bottom: none; }
.tj-event-time { color: var(--muted2); font-family: var(--lt-font-mono, monospace); font-size: 9px; flex-shrink: 0; min-width: 38px; padding-top: 1px; }
.tj-event-type { flex-shrink: 0; }
.tj-event-desc { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tj-event-restore { flex-shrink: 0; opacity: 0; transition: opacity .12s; }
.tj-event-row:hover .tj-event-restore { opacity: 1; }
.tj-pill { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 999px; font-size: 9px; font-weight: 700; border: 1px solid; white-space: nowrap; }
.tj-pill.trade { background: rgba(79,70,229,.1); color: var(--brand); border-color: rgba(79,70,229,.2); }
.tj-pill.batch { background: rgba(22,163,74,.1); color: var(--good); border-color: rgba(22,163,74,.2); }
.tj-pill.customer { background: rgba(14,165,233,.1); color: var(--t5, #0ea5e9); border-color: rgba(14,165,233,.2); }
.tj-pill.settings { background: rgba(217,119,6,.1); color: var(--warn); border-color: rgba(217,119,6,.2); }
.tj-pill.cloud { background: rgba(168,85,247,.1); color: #a855f7; border-color: rgba(168,85,247,.2); }
.tj-pill.system { background: rgba(148,163,184,.1); color: var(--muted); border-color: var(--line); }
.tj-pill.error { background: rgba(220,38,38,.1); color: var(--bad); border-color: rgba(220,38,38,.2); }
.tj-pill.data { background: rgba(245,158,11,.1); color: var(--warn); border-color: rgba(245,158,11,.2); }
.tj-day-sep { font-size: 9px; font-weight: 900; letter-spacing: .6px; text-transform: uppercase; color: var(--muted2); padding: 8px 0 4px; }
.tj-diff-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--line2); font-size: calc(10px * var(--ui-scale,1)); }
.tj-diff-row:last-child { border-bottom: none; }
.tj-diff-key { color: var(--muted); font-weight: 600; }
.tj-diff-change { display: flex; gap: 6px; align-items: center; }
.tj-diff-before { color: var(--bad); font-family: var(--lt-font-mono, monospace); font-size: 9px; }
.tj-diff-after  { color: var(--good); font-family: var(--lt-font-mono, monospace); font-size: 9px; }
.tj-health-score { font-size: calc(28px * var(--ui-scale,1)); font-weight: 900; line-height: 1; }
.tj-health-good { color: var(--good); }
.tj-health-warn { color: var(--warn); }
.tj-health-bad  { color: var(--bad); }
.tj-search-box { display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--input-bg); border-radius: 999px; padding: 4px 10px; transition: border-color .15s; }
.tj-search-box:focus-within { border-color: var(--brand); }
.tj-search-box input { border: none; outline: none; background: transparent; color: var(--text); font-size: calc(10px * var(--ui-scale,1)); min-width: 120px; font-family: var(--app-font, inherit); }



.sideFooter {
  padding: 8px 10px; border-top: 1px solid var(--line); flex-shrink: 0;
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}

/* ── TOPBAR ── */
.topbar {
  flex: 0 0 auto; flex-shrink: 0; height: var(--lt-topbar-h, 54px);
  padding: 0 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(12px); z-index: 10;
  position: relative;
  will-change: transform, margin-bottom;
  transition: background var(--lt-tr), border-color var(--lt-tr), transform var(--lt-tr), margin-bottom var(--lt-tr), opacity var(--lt-tr);
}
.pageTitle { font-size: calc(12px * var(--ui-scale,1)); font-weight: 800; letter-spacing: -.2px; }
.pageSub { display: none; }
.topRight { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
.searchBox {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid var(--line); background: var(--input-bg);
  border-radius: 999px; padding: 5px 10px;
  transition: border-color var(--lt-tr), box-shadow var(--lt-tr);
}
.searchBox:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand3); }
.searchBox svg { width: 12px; height: 12px; opacity: .5; flex-shrink: 0; }
.searchBox input { border: none; outline: none; background: transparent; color: var(--text); font-size: calc(11px * var(--ui-scale,1)); min-width: 100px; max-width: 150px; font-family: var(--app-font, var(--lt-font, inherit)); }
.searchBox input::placeholder { color: var(--muted2); }
.seg { display: flex; gap: 2px; padding: 3px; border-radius: var(--lt-radius-sm); border: 1px solid var(--line); background: rgba(255,255,255,.02); }
.seg button { border: 1px solid transparent; background: transparent; color: var(--muted); border-radius: calc(var(--lt-radius-sm) - 2px); padding: 4px 8px; font-size: calc(10px * var(--ui-scale,1)); cursor: pointer; font-family: var(--app-font, var(--lt-font, inherit)); font-weight: 700; transition: all var(--lt-tr); }
#curSeg button { font-size: calc(5px * var(--ui-scale,1)); }
.seg button:hover { color: var(--text); }
.seg button.active { background: var(--brand); color: white; box-shadow: 0 2px 8px var(--glow); }
#curSeg button,#langSeg button{min-width:74px;height:30px;padding:6px 12px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:calc(10px * var(--ui-scale,1));line-height:1;}

/* ── ICON BUTTON ── */
.iconBtn { border: 1px solid var(--line); background: rgba(255,255,255,.03); color: var(--muted); border-radius: var(--lt-radius-sm); padding: 6px; cursor: pointer; display: grid; place-items: center; transition: all var(--lt-tr); }
.iconBtn:hover { background: var(--hover-card); border-color: var(--brand); color: var(--brand); transform: translateY(-2px); box-shadow: 0 4px 12px var(--glow); }
.iconBtn svg { width: 14px; height: 14px; }

/* ── SCROLL AREA ── */
.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.scroll::-webkit-scrollbar { width: 4px; }
.scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

/* ── CARDS (interactive hover) ── */
.card {
  background: var(--card-bg); border: 1px solid var(--line);
  border-radius: var(--lt-radius); overflow: hidden; min-width: 0;
  box-shadow: var(--lt-shadow2); transition: all var(--lt-tr);
  position: relative;
}
.card:hover { border-color: color-mix(in srgb, var(--brand) 40%, transparent); box-shadow: var(--lt-shadow), 0 0 0 1px color-mix(in srgb, var(--brand) 20%, transparent); transform: translateY(-2px); }
.card::after { content:''; position:absolute; inset:0; border-radius: inherit; background: linear-gradient(135deg, var(--glow,rgba(99,102,241,.05)), transparent 60%); opacity:0; transition: opacity var(--lt-tr); pointer-events:none; }
.card:hover::after { opacity:1; }
.cardHead { padding: 10px 12px 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--line); }
.cardHead h3 { margin: 0; font-size: calc(11px * var(--ui-scale,1)); font-weight: 800; letter-spacing: .3px; color: var(--muted); text-transform: uppercase; }
.cardBody { padding: 12px; }
.panel { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--lt-radius); overflow: hidden; box-shadow: var(--lt-shadow2); transition: all var(--lt-tr); }
.panel:hover { border-color: color-mix(in srgb, var(--brand) 30%, transparent); }
.panel-head { padding: 10px 12px 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg,rgba(255,255,255,.02),transparent); }
.panel-head h2 { margin: 0; font-size: calc(11px * var(--ui-scale,1)); font-weight: 700; }
.panel-body { padding: 12px; }

/* ── PILLS / BADGES ── */
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,.03); color: var(--muted); font-size: calc(10px * var(--ui-scale,1)); white-space: nowrap; font-family: var(--app-font, var(--lt-font)); transition: all var(--lt-tr); }
.pill:hover { border-color: var(--brand); color: var(--brand); background: var(--brand3); }
.pill.good { color: var(--good); border-color: color-mix(in srgb,var(--good) 30%,transparent); background: color-mix(in srgb,var(--good) 10%,transparent); }
.pill.warn { color: var(--warn); border-color: color-mix(in srgb,var(--warn) 30%,transparent); background: color-mix(in srgb,var(--warn) 10%,transparent); }
.pill.bad  { color: var(--bad);  border-color: color-mix(in srgb,var(--bad)  30%,transparent); background: color-mix(in srgb,var(--bad)  10%,transparent); }

/* ── KPI CARDS (interactive hover) ── */
.kpis { display: grid; gap: 4px; grid-template-columns: repeat(4,minmax(0,1fr)); }
.kpi-card {
  background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--lt-radius);
  padding: 6px; box-shadow: var(--lt-shadow2); position: relative; overflow: hidden;
  transition: all var(--lt-tr); cursor: default;
}
.kpi-card::before { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; background: var(--kpi-accent); opacity:.08; pointer-events:none; transition: opacity var(--lt-tr), transform var(--lt-tr); }
.kpi-card:hover { transform: translateY(-3px); box-shadow: var(--lt-shadow); border-color: color-mix(in srgb,var(--brand) 40%,transparent); }
.kpi-card:hover::before { opacity:.15; transform: scale(1.2); }
.kpi-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background: var(--kpi-accent); opacity:0; transition: opacity var(--lt-tr); }
.kpi-card:hover::after { opacity:1; }
.kpi-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
.kpi-ico { width: 32px; height: 32px; border-radius: var(--lt-radius-sm); display: grid; place-items: center; transition: transform var(--lt-tr), box-shadow var(--lt-tr); }
.kpi-ico svg { width: 16px; height: 16px; }
.kpi-card:hover .kpi-ico { transform: scale(1.1); box-shadow: 0 4px 12px var(--glow); }
.kpi-lbl { font-size: calc(6px * var(--ui-scale,1)); font-weight: 800; letter-spacing: .4px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.kpi-val { font-size: calc(13px * var(--ui-scale,1)); font-weight: 800; letter-spacing: -.1px; line-height: 1; font-family: var(--app-font, var(--lt-font)); }
.kpi-sub { font-size: calc(8px * var(--ui-scale,1)); color: var(--muted); margin-top: 2px; line-height: 1.1; }
.kpi-badge { font-size: calc(9px * var(--ui-scale,1)); font-weight: 700; padding: 2px 7px; border-radius: 999px; border: 1px solid; white-space: nowrap; transition: all var(--lt-tr); }
.c1{background:rgba(69,184,200,.12);color:#45B8C8;} .c2{background:rgba(224,82,82,.12);color:#E05252;} .c3{background:rgba(245,166,35,.12);color:#F5A623;} .c4{background:rgba(91,155,213,.12);color:#5B9BD5;} .c5{background:rgba(232,131,90,.12);color:#E8835A;} .c6{background:rgba(46,204,113,.12);color:#2ECC71;}
.good{color:var(--good)!important;} .bad{color:var(--bad)!important;} .warn{color:var(--warn)!important;} .t1v{color:var(--t1)!important;} .t2v{color:var(--t2)!important;}

/* ── KPI BANDS ── */
.kpi-band-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.kpi-band { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--lt-radius); padding: 8px; box-shadow: var(--lt-shadow2); transition: all var(--lt-tr); }
.kpi-band:hover { border-color: color-mix(in srgb, var(--brand) 35%, transparent); box-shadow: var(--lt-shadow); transform: translateY(-2px); }
.kpi-band-title { font-size: calc(7px * var(--ui-scale,1)); font-weight: 800; letter-spacing: .4px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.kpi-band-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.kpi-period { font-size: calc(7px * var(--ui-scale,1)); font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--muted2); margin-bottom: 2px; }
.kpi-cell-val { font-size: calc(14px * var(--ui-scale,1)); font-weight: 800; }
.kpi-cell-sub { font-size: calc(8px * var(--ui-scale,1)); color: var(--muted); margin-top: 2px; }

/* ── TABLES ── */
.tableWrap { overflow-x: auto; border-radius: var(--lt-radius); border: 1px solid var(--line); }
.ledgerWrap{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}
.ledgerWrap::-webkit-scrollbar{height:0;}

table { width: 100%; border-collapse: separate; border-spacing: 0; background: rgba(0,0,0,.03); font-family: var(--app-font, var(--ledger-font, var(--lt-font,sans-serif))); font-size: var(--ui-fs, var(--ledger-fs,11px)); }
thead th { position: sticky; top: 0; background: var(--panel2); border-bottom: 1px solid var(--line); text-align: left; padding: 8px 10px; font-size: clamp(9px, calc(var(--ui-fs, var(--ledger-fs,11px)) - 3px), 12px); font-weight: 700; color: var(--muted); white-space: nowrap; letter-spacing: .4px; text-transform: uppercase; }
tbody td { border-bottom: 1px solid var(--line); padding: 8px 10px; font-size: var(--ui-fs, var(--ledger-fs,11px)); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--hover-card, rgba(255,255,255,.03)); }
tbody tr { transition: background var(--lt-tr); }
.r { text-align: right; }
.mono { font-family: var(--app-font, var(--lt-font-mono)); font-size: var(--ui-fs, var(--ledger-fs,11px)); }
.muted { color: var(--muted); }

/* ── PROGRESS BARS ── */
.prog { width: 100%; max-width: 120px; height: 6px; border-radius: 999px; background: rgba(255,255,255,.07); border: 1px solid var(--line); overflow: hidden; position: relative; }
.prog > span { position: absolute; top: 0; left: 0; bottom: 0; width: 0%; background: linear-gradient(90deg, var(--good), var(--t3)); transition: width .4s ease; }
.prog.neg > span { background: linear-gradient(90deg, var(--bad), var(--warn)); }

/* ── ROW BUTTONS ── */
.rowBtn { border: 1px solid var(--line); background: rgba(255,255,255,.03); color: var(--muted); padding: 4px 8px; border-radius: var(--lt-radius-sm); cursor: pointer; font-size: calc(10px * var(--ui-scale,1)); display: inline-flex; align-items: center; gap: 3px; white-space: nowrap; font-family: var(--app-font, var(--lt-font)); transition: all var(--lt-tr); font-weight: 600; }
.rowBtn:hover { background: var(--hover-card); border-color: var(--brand); color: var(--brand); transform: translateY(-1px); box-shadow: 0 2px 8px var(--glow); }
.actionsRow { display: flex; gap: 4px; flex-wrap: nowrap; }

/* ── FORMS ── */
.formPanel { border: 1px solid var(--line); border-radius: var(--lt-radius); background: rgba(255,255,255,.02); overflow: hidden; transition: border-color var(--lt-tr); }
.formPanel:hover { border-color: color-mix(in srgb,var(--brand) 30%,transparent); }
.formPanel .hdr { padding: 6px 10px; border-bottom: 1px solid var(--line); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; font-size: calc(9px * var(--ui-scale,1)); color: var(--muted); background: linear-gradient(90deg, rgba(255,255,255,.02), transparent); }
.formPanel .inner { padding: 6px; display: flex; flex-direction: column; gap: 4px; }

.salePanel .hdr { padding: 5px 8px; font-size: calc(8px * var(--ui-scale,1)); }
.salePanel .inner { padding: 5px; gap: 3px; }
.salePanel .inputBox { padding: 4px 6px; }
.salePanel .inputBox input { font-size: calc(11px * var(--ui-scale,1)); }
.salePanel .modeToggle { padding: 2px; }
.salePanel .btn { padding: 5px 8px; }
.bannerRow { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--lt-radius-sm); border: 1px solid color-mix(in srgb,var(--brand) 25%,transparent); background: var(--brand3); }
.bannerRow .bLbl { color: var(--muted); font-size: calc(10px * var(--ui-scale,1)); font-weight: 700; }
.bannerRow .bVal { font-family: var(--app-font, var(--lt-font-mono)); font-size: calc(14px * var(--ui-scale,1)); font-weight: 900; color: var(--brand); }
.bannerRow .bSpacer { flex: 1; }
.bannerRow .bPill { padding: 3px 8px; border-radius: 999px; border: 1px solid color-mix(in srgb,var(--brand) 25%,transparent); background: var(--brand3); color: var(--brand); font-weight: 800; font-size: calc(9px * var(--ui-scale,1)); }
.field2 { display: flex; flex-direction: column; gap: 4px; }
.field2 .lbl { font-size: calc(9px * var(--ui-scale,1)); font-weight: 900; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
.inputBox { position: relative; border: 1px solid var(--line); background: var(--input-bg); border-radius: var(--lt-radius-sm); padding: 8px 10px; transition: border-color var(--lt-tr), box-shadow var(--lt-tr); }
.inputBox:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand3); }
.inputBox input { width: 100%; border: none; outline: none; background: transparent; color: var(--text); font-size: calc(13px * var(--ui-scale,1)); padding-right: 30px; font-family: var(--app-font, var(--lt-font)); }
.inputBox .ico { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; opacity: .5; pointer-events: none; color: var(--brand); }
.modeToggle { display: flex; gap: 4px; padding: 4px; border-radius: var(--lt-radius-sm); border: 1px solid var(--line); background: rgba(255,255,255,.02); }
.modeToggle button { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid transparent; background: transparent; color: var(--muted); border-radius: calc(var(--lt-radius-sm) - 2px); padding: 7px; font-weight: 900; font-size: calc(10px * var(--ui-scale,1)); cursor: pointer; font-family: var(--app-font, var(--lt-font)); transition: all var(--lt-tr); }
.modeToggle button svg { width: 13px; height: 13px; }
.modeToggle button:hover { color: var(--brand); }
.modeToggle button.active { background: var(--brand3); color: var(--brand); border-color: color-mix(in srgb,var(--brand) 30%,transparent); }
.g2tight { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.previewBox { border-radius: var(--lt-radius-sm); border: 1px solid color-mix(in srgb,var(--brand) 20%,transparent); background: var(--brand3); padding: 10px; }
.previewBox .pt { font-size: calc(9px * var(--ui-scale,1)); font-weight: 900; letter-spacing: .8px; text-transform: uppercase; color: var(--brand); margin-bottom: 6px; }
.previewBox .pr { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; font-size: calc(11px * var(--ui-scale,1)); }
.previewBox .pr strong { font-family: var(--app-font, var(--lt-font-mono)); font-weight: 900; }
.formActions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field input, .field select { width: 100%; border: 1px solid var(--line); background: var(--input-bg); color: var(--text); border-radius: var(--lt-radius-sm); padding: 7px 9px; font-size: calc(12px * var(--ui-scale,1)); outline: none; font-family: var(--app-font, var(--lt-font)); transition: border-color var(--lt-tr); }
.field input:focus, .field select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand3); }
.label { font-size: calc(10px * var(--ui-scale,1)); color: var(--muted); font-weight: 600; }
.sideAction { width: 34px; height: 34px; border-radius: var(--lt-radius-sm); border: 1px solid var(--line); background: rgba(255,255,255,.03); display: grid; place-items: center; cursor: pointer; transition: all var(--lt-tr); flex-shrink: 0; }
.sideAction:hover { background: var(--hover-card); border-color: var(--brand); color: var(--brand); transform: scale(1.08); }
.sideAction svg { width: 14px; height: 14px; }

/* ── MODERN LOOKUP / SEARCHABLE DROPDOWN ── */
/* ── LOOKUP DROPDOWN — redesigned modern ── */
.lookupShell{position:relative;}
.lookupBox{padding-right:6px;}
.lookupBox input[autocomplete="off"]::-webkit-search-cancel-button{display:none;}
.lookupToggle svg{transition:transform .2s cubic-bezier(.4,0,.2,1);}
.lookupShell.open .lookupToggle svg{transform:rotate(180deg);}
.lookupMenu{
  position:absolute; left:0; right:0; top:calc(100% + 5px); z-index:120;
  display:none; max-height:260px; overflow-y:auto;
  background:var(--panel);
  border:1.5px solid var(--brand);
  border-radius:14px;
  box-shadow:0 4px 6px -1px rgba(0,0,0,.1), 0 20px 48px -8px rgba(0,0,0,.32), 0 0 0 1px color-mix(in srgb,var(--brand) 12%,transparent) inset;
  padding:5px;
  scrollbar-width:thin; scrollbar-color:var(--brand) transparent;
}
.lookupMenu::-webkit-scrollbar{width:4px;}
.lookupMenu::-webkit-scrollbar-track{background:transparent;}
.lookupMenu::-webkit-scrollbar-thumb{background:var(--brand);border-radius:999px;}
.lookupMenu.open{display:block;animation:lookupSlideIn .14s cubic-bezier(.4,0,.2,1);}
@keyframes lookupSlideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.lookupItem{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  width:100%; border:none; background:transparent; text-align:left;
  padding:10px 13px; border-radius:10px; cursor:pointer;
  transition:background .13s ease, transform .13s ease;
  border:1px solid transparent;
}
.lookupItem:hover,.lookupItem:focus-visible{
  background:color-mix(in srgb,var(--brand) 10%,var(--panel2));
  border-color:color-mix(in srgb,var(--brand) 22%,transparent);
  transform:translateX(2px);
  outline:none;
}
.lookupMain{min-width:0; display:flex; flex-direction:column; gap:3px; flex:1;}
.lookupName{
  font-size:calc(13px * var(--ui-scale,1)); font-weight:800;
  color:var(--text);
  line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  letter-spacing:-.01em;
}
.lookupMeta{
  font-size:calc(10px * var(--ui-scale,1)); font-weight:500;
  color:var(--muted);
  line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.lookupBadge{
  flex-shrink:0; padding:4px 10px; border-radius:999px;
  border:1.5px solid color-mix(in srgb,var(--brand) 35%,transparent);
  background:color-mix(in srgb,var(--brand) 13%,transparent);
  color:var(--brand);
  font-size:calc(9px * var(--ui-scale,1)); font-weight:800; letter-spacing:.4px;
  text-transform:uppercase;
}
.lookupEmpty{padding:14px 12px; border-radius:10px; background:color-mix(in srgb,var(--brand) 5%,transparent); border:1px dashed color-mix(in srgb,var(--brand) 20%,transparent);}
.lookupEmptyTitle{font-size:calc(11px * var(--ui-scale,1)); font-weight:800; color:var(--text); margin-bottom:4px;}
.lookupEmptySub{font-size:calc(9px * var(--ui-scale,1)); color:var(--muted); line-height:1.45;}
.lookupHint{margin-top:5px; font-size:calc(9px * var(--ui-scale,1)); color:var(--muted); font-style:italic;}
.tradeBuyerChip{
  display:inline-flex; align-items:center; max-width:160px; padding:2px 8px; border-radius:999px;
  border:1px solid color-mix(in srgb,var(--brand) 22%, transparent); background:var(--brand3);
  color:var(--text); font-size:calc(9px * var(--ui-scale,1)); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
@media (max-width:768px){
  .lookupMenu{max-height:210px; border-radius:12px;}
  .lookupItem{padding:9px 11px;}
  .lookupName{font-size:calc(12px * var(--ui-scale,1));}
  .tradeBuyerChip{max-width:120px;}
}

/* ── BUTTONS ── */
.btn { border: 1px solid transparent; background: var(--brand); color: white; border-radius: var(--lt-radius-sm); padding: 7px 12px; cursor: pointer; font-weight: 700; font-size: calc(11px * var(--ui-scale,1)); font-family: var(--app-font, var(--lt-font)); display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; transition: all var(--lt-tr); box-shadow: 0 2px 8px var(--glow); }
.btn:hover { filter: brightness(1.12); transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow); }
.btn:active { transform: translateY(0); }
.btn.secondary { background: rgba(255,255,255,.05); border-color: var(--line); color: var(--text); box-shadow: none; }
.btn.secondary:hover { background: var(--hover-card); border-color: var(--brand); color: var(--brand); box-shadow: 0 4px 12px var(--glow); }
.btn.danger { background: rgba(239,68,68,.85); box-shadow: 0 2px 8px rgba(239,68,68,.25); }
.btn.danger:hover { box-shadow: 0 6px 20px rgba(239,68,68,.4); }
.btn svg { width: 13px; height: 13px; }
.msg { font-size: calc(11px * var(--ui-scale,1)); margin-top: 5px; color: var(--muted); }
.msg.err { color: var(--bad); }
.msg.ok  { color: var(--good); }

/* ── DIVIDER ── */
.div-line { height: 1px; background: var(--line); margin: 7px 0; }
.prev-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 3px 0; font-size: calc(12px * var(--ui-scale,1)); }
.prev-row .kpi-lbl { margin: 0; }

/* ── CHARTS ── */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.chart-box { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--lt-radius); overflow: hidden; box-shadow: var(--lt-shadow2); transition: all var(--lt-tr); }
.chart-box:hover { border-color: color-mix(in srgb,var(--brand) 35%,transparent); box-shadow: var(--lt-shadow); }
.chart-box.full { grid-column: 1 / -1; }
.twoColPage { display:grid; grid-template-columns:minmax(0,1fr) minmax(280px,320px); gap:10px; align-items:start; }
.chart-title { font-size: calc(11px * var(--ui-scale,1)); font-weight: 700; padding: 9px 12px 3px; }
.chart-sub { font-size: calc(10px * var(--ui-scale,1)); color: var(--muted); padding: 0 12px 6px; }
.chart-wrap { padding: 6px 12px 10px; height: 190px; position: relative; }
.stats-table { width: 100%; border-collapse: collapse; font-size: calc(11px * var(--ui-scale,1)); }
.stats-table th { padding: 5px 7px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--line); font-size: calc(9px * var(--ui-scale,1)); color: var(--muted); text-align: left; text-transform: uppercase; letter-spacing: .4px; }
.stats-table td { padding: 5px 7px; border-bottom: 1px solid var(--line); }
.stats-table tr:last-child td { border-bottom: none; }
.stats-table tr:hover td { background: var(--hover-card); }
.analytics-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 7px; }
.astat { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--lt-radius-sm); padding: 10px; transition: all var(--lt-tr); cursor: default; }
.astat:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 4px 16px var(--glow); }
.astat-lbl { font-size: calc(9px * var(--ui-scale,1)); font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.astat-val { font-size: calc(15px * var(--ui-scale,1)); font-weight: 800; }

/* ── CYCLE BADGE ── */
.cycle-badge { display: inline-flex; align-items: center; gap: 3px; font-size: calc(9px * var(--ui-scale,1)); font-weight: 700; padding: 2px 6px; border-radius: 999px; background: var(--brand3); color: var(--brand); border: 1px solid color-mix(in srgb,var(--brand) 30%,transparent); transition: all var(--lt-tr); }
.cycle-badge:hover { box-shadow: 0 0 8px var(--glow); }

/* ── TOAST ── */
.toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(10px); background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 9px 16px; border-radius: 999px; box-shadow: var(--lt-shadow); opacity: 0; pointer-events: none; transition: opacity .15s, transform .15s; font-size: calc(12px * var(--ui-scale,1)); z-index: 60; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.good { border-color: color-mix(in srgb,var(--good) 40%,transparent); }
.toast.bad  { border-color: color-mix(in srgb,var(--bad)  40%,transparent); }

/* ── MODAL ── */
.modalBg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 70; backdrop-filter: blur(6px); }
.modalBg.open { display: flex; }
.modal { width: min(680px, 95vw); background: var(--panel); border: 1px solid var(--line); border-radius: var(--lt-radius); box-shadow: var(--lt-shadow); overflow: hidden; }
.modalHead { padding: 10px 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.modalHead h3 { margin: 0; font-size: calc(13px * var(--ui-scale,1)); font-weight: 700; }
.modalBody { padding: 14px; color: var(--text); font-size: calc(12px * var(--ui-scale,1)); max-height: 60vh; overflow-y: auto; }
.modalActions { padding: 10px 12px; border-top: 1px solid var(--line); display: flex; gap: 8px; justify-content: flex-end; }

/* ── CASH BOX MODAL (Dark + Emerald) ── */
.cashbox-grid{display:grid;gap:10px;}
.cashbox-label{font-size:12px;font-weight:700;color:#6dd48e;letter-spacing:.01em;}
.cashbox-balance,.cashbox-total{background:#1b1b1b;border:1px solid #262626;border-radius:10px;padding:12px 14px;color:#E0E0E0;font-weight:800;font-size:24px;line-height:1.1;}
.cashbox-total{font-size:20px;}
.cashbox-input,.cashbox-textarea{width:100%;background:#171717;border:1px solid #333;color:#e7e7e7;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;}
.cashbox-input:focus,.cashbox-textarea:focus{border-color:#00FF88;box-shadow:0 0 0 3px rgba(0,255,136,.18);}
.cashbox-textarea{min-height:70px;resize:vertical;}
.cashbox-help{font-size:12px;color:#71b786;}
.cashbox-actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;width:100%;}
.cashbox-cancel{background:transparent;border:1px solid transparent;color:#9fb5a6;text-decoration:underline;text-underline-offset:2px;box-shadow:none;}
.cashbox-clear{background:transparent;border:1px solid #FF4D4D;color:#FF4D4D;}
.cashbox-add{background:#00C853;border:1px solid #00C853;color:#fff;box-shadow:0 8px 18px rgba(0,200,83,.32);font-weight:800;}

/* ── DASH LAYOUT ── */
.dash-bottom { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; align-items: start; }
.input { border: 1px solid var(--line); background: var(--input-bg); color: var(--text); border-radius: var(--lt-radius-sm); padding: 6px 9px; font-size: calc(11px * var(--ui-scale,1)); outline: none; font-family: var(--app-font, var(--lt-font)); transition: border-color var(--lt-tr); width: 100%; }
.input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand3); }
.input::placeholder { color: var(--muted2); }

/* ── CALENDAR ── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav h2 { font-size: calc(16px * var(--ui-scale,1)); font-weight: 800; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.cal-hdr { text-align: center; font-size: calc(9px * var(--ui-scale,1)); font-weight: 900; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); padding: 6px 0; }
.cal-day {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: var(--lt-radius-sm); background: var(--panel2); border: 1px solid var(--line);
  font-size: calc(11px * var(--ui-scale,1)); cursor: pointer; position: relative;
  transition: all var(--lt-tr); min-height: 60px; padding: 4px;
  overflow: hidden;
}
.cal-day::before { content:''; position:absolute; inset:0; border-radius:inherit; background: linear-gradient(135deg, var(--glow,rgba(99,102,241,.1)), transparent); opacity:0; transition: opacity var(--lt-tr); }
.cal-day:hover { border-color: var(--brand); transform: scale(1.04); box-shadow: 0 4px 16px var(--glow); background: var(--hover-card); }
.cal-day:hover::before { opacity:1; }
.cal-day.has-profit { background: color-mix(in srgb,var(--good) 12%,var(--panel2)); border-color: color-mix(in srgb,var(--good) 30%,transparent); }
.cal-day.has-profit:hover { border-color: var(--good); box-shadow: 0 4px 16px color-mix(in srgb,var(--good) 25%,transparent); }
.cal-day.has-loss { background: color-mix(in srgb,var(--bad) 12%,var(--panel2)); border-color: color-mix(in srgb,var(--bad) 30%,transparent); }
.cal-day.has-loss:hover { border-color: var(--bad); box-shadow: 0 4px 16px color-mix(in srgb,var(--bad) 25%,transparent); }
.cal-day.today { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand3); background: var(--brand3); }
.cal-day.today:hover { box-shadow: 0 0 0 2px var(--brand3), 0 4px 16px var(--glow); }
.cal-day.selected { border-color: var(--brand) !important; box-shadow: 0 0 0 3px var(--brand3) !important; background: var(--brand3) !important; }
.cal-day.empty { background: transparent; border: none; cursor: default; }
.cal-day.empty:hover { transform: none; box-shadow: none; }
.cal-num { font-weight: 700; font-size: calc(12px * var(--ui-scale,1)); line-height: 1; }
.cal-profit { font-family: var(--app-font, var(--lt-font-mono)); font-size: calc(9px * var(--ui-scale,1)); font-weight: 700; margin-top: 2px; }
.cal-count { font-size: calc(8px * var(--ui-scale,1)); color: var(--muted); margin-top: 1px; }
.cal-detail { margin-top: 10px; }
.cal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.cal-stat { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--lt-radius-sm); padding: 10px 12px; transition: all var(--lt-tr); }
.cal-stat:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 4px 12px var(--glow); }

/* ── TEMPLATE SELECTOR ── */
.lt-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
.lt-card {
  border: 2px solid var(--line); border-radius: var(--lt-radius-sm); padding: 10px;
  cursor: pointer; transition: all var(--lt-tr); position: relative; background: var(--card-bg);
  overflow: hidden;
}
.lt-card:hover { border-color: var(--brand); transform: translateY(-3px); box-shadow: 0 8px 24px var(--glow); }
.lt-card.active { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand3); }
.lt-card.active::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: var(--kpi-accent); }
.lt-name { font-size: calc(11px * var(--ui-scale,1)); font-weight: 800; }
.lt-desc { font-size: calc(9px * var(--ui-scale,1)); color: var(--muted); margin-top: 2px; }
.lt-swatches { display: flex; gap: 3px; margin-top: 7px; }
.lt-swatch { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,.15); transition: transform var(--lt-tr); }
.lt-card:hover .lt-swatch { transform: scale(1.15); }
.lt-tick { position: absolute; top: 6px; right: 6px; width: 16px; height: 16px; background: var(--brand); border-radius: 50%; display: none; place-items: center; box-shadow: 0 2px 6px var(--glow); }
.lt-tick svg { width: 9px; height: 9px; }
.lt-card.active .lt-tick { display: grid; }
.theme-colors { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-top: 10px; }
.tc-btn { border: 2px solid var(--line); border-radius: var(--lt-radius-sm); padding: 8px; cursor: pointer; transition: all var(--lt-tr); display: flex; flex-direction: column; gap: 5px; align-items: center; background: var(--card-bg); font-family: var(--app-font, var(--lt-font)); }
.tc-btn:hover { border-color: var(--brand); transform: scale(1.05); box-shadow: 0 4px 12px var(--glow); }
.tc-btn.active { border-color: var(--brand); background: var(--brand3); box-shadow: 0 0 0 3px var(--brand3); }
.tc-swatch-row { display: flex; gap: 3px; }
.tc-sw { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,.15); }
.tc-name { font-size: calc(9px * var(--ui-scale,1)); font-weight: 700; color: var(--muted); text-align: center; }

/* ── EMPTY / MOBILE ── */
.empty { text-align: center; padding: 36px 20px; color: var(--muted); }
.empty svg { width: 32px; height: 32px; opacity: .35; margin: 0 auto 8px; display: block; }
.empty-t { font-size: calc(13px * var(--ui-scale,1)); font-weight: 700; }
.empty-s { font-size: calc(11px * var(--ui-scale,1)); margin-top: 3px; }
.mobileNav { display: none; position: fixed; left: 8px; right: 8px; bottom: max(8px, env(safe-area-inset-bottom)); z-index: 40; background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 5px; backdrop-filter: blur(12px); }
.mobileNav .row { display: grid; grid-template-columns: repeat(9,1fr); gap: 3px; }
.mBtn { border: 1px solid transparent; background: transparent; color: var(--muted); border-radius: 14px; padding: 7px 3px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; font-size: calc(8px * var(--ui-scale,1)); font-family: var(--app-font, var(--lt-font)); transition: all var(--lt-tr); }
.mBtn svg { width: 14px; height: 14px; }
.mBtn:hover, .mBtn.active { background: var(--brand3); border-color: color-mix(in srgb,var(--brand) 30%,transparent); color: var(--brand); }


.mobileSidebarToggle { display: none; margin-right: 8px; }
.sidebarBackdrop { display: none; }

@media (max-width: 768px) {
  .mainWrap { min-height: 0; height: var(--app-vh, 100dvh); }
  .scroll { min-height: 0; flex: 1 1 auto; }
  #pageBody { min-height: 0; }

  .mobileSidebarToggle { display: grid; }
  .sidebarBackdrop {
    display: block; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    opacity: 0; pointer-events: none; transition: opacity var(--lt-tr); z-index: 24;
  }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: min(280px, 82vw); max-width: 82vw;
    height: var(--app-vh, 100dvh); min-height: var(--app-vh, 100dvh); transform: translateX(-100%); transition: transform var(--lt-tr), background var(--lt-tr);
    z-index: 25; display: flex;
  }
  body.sidebar-open .sidebar { transform: translateX(0); }
  body.sidebar-open .sidebarBackdrop { opacity: 1; pointer-events: auto; }
  .mainWrap, .scroll, #pageBody { flex: 1; }
  .topbar { flex: 0 0 auto !important; }
}

@media(max-width:900px){
  body.mobile-topbar-hidden .topbar{
    transform:none !important;
    margin-bottom:0 !important;
    opacity:1 !important;
    pointer-events:auto !important;
  }
  .app{display:block;} .mobileNav{display:block;}
  .scroll{padding-bottom:calc(80px + env(safe-area-inset-bottom));} .kpis,.kpi-band-grid{grid-template-columns:1fr 1fr;}
  .chart-grid,.analytics-stats,.lt-grid{grid-template-columns:1fr 1fr;}
  .twoColPage{grid-template-columns:1fr;}
  .dash-bottom{grid-template-columns:1fr;} .g2tight{grid-template-columns:1fr;}
  table{min-width:0;width:100%;}

  /* full-width guard: prevent right-side empty strip across all pages */
  .mainWrap,.topbar,.scroll,#pageBody{width:100%;max-width:100%;box-sizing:border-box;}
  #pageBody > *,.panel,.card,.tableWrap,.twoColPage,.dash-bottom,.chart-grid,.kpis,.kpi-band-grid,.analytics-stats,.lt-grid,.theme-colors{width:100%;min-width:0;max-width:100%;}

  /* mobile topbar: keep one compact row only */
  .topbar{height:auto;min-height:0;padding:6px 8px;flex-direction:row;align-items:center;justify-content:space-between;gap:6px;position:sticky;top:0;left:0;right:0;z-index:16;}
  .topbar > div:first-child{display:none;}
  .pageTitle,.pageSub{display:none !important;}
  .topRight{width:100%;display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,.95fr) auto;gap:4px;align-items:center;}
  .searchBox,#topAlertWrap,#curSeg,#diagBtn,#exportBtn,#syncBadge,#topbarUser,#addBtn{display:none !important;}
  #rangeSeg{order:1;justify-self:stretch;width:100%;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:2px;min-width:0;}
  #rangeSeg button{padding:6px 2px;min-width:0;font-size:calc(9px * var(--ui-scale,1));}
  #langSeg{order:2;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:2px;min-width:0;}
  #langSeg button{padding:6px 2px;min-width:0;font-size:calc(9px * var(--ui-scale,1));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mobileSidebarToggle{order:3;align-self:center;justify-self:end;margin-right:0;}
  .topbar{margin-bottom:0 !important;}
  .scroll{padding-top:0 !important;}
  #pageBody{margin-top:0 !important;}

  /* compact table density across pages on mobile */
  thead th{padding:7px 6px;font-size:calc(9px * var(--ui-scale,1));}
  tbody td{padding:7px 6px;font-size:calc(10px * var(--ui-scale,1));}

  /* force inline two/three-column content grids to stack on phones */
  #pageBody [style*="grid-template-columns:1fr 1fr"],
  #pageBody [style*="grid-template-columns:1fr 1fr 1fr"],
  #pageBody [style*="grid-template-columns:1.1fr .9fr"]{grid-template-columns:1fr !important;}

  /* tighter mobile tables for Orders/Stock so they fit like Vault/P2P */
  body[data-page="orders"] table,
  body[data-page="stock"] table{min-width:0;width:100%;table-layout:fixed;}
  body[data-page="orders"] .tableWrap,
  body[data-page="stock"] .tableWrap{overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  body[data-page="orders"] table th,
  body[data-page="orders"] table td,
  body[data-page="stock"] table th,
  body[data-page="stock"] table td{min-width:0;overflow:hidden;text-overflow:ellipsis;}

  body[data-page="orders"] table th:nth-child(3),
  body[data-page="orders"] table td:nth-child(3),
  body[data-page="orders"] table th:nth-child(5),
  body[data-page="orders"] table td:nth-child(5),
  body[data-page="orders"] table th:nth-child(8),
  body[data-page="orders"] table td:nth-child(8){display:none;}
  body[data-page="orders"] table td:nth-child(7) .prog{max-width:68px;}

  body[data-page="stock"] table th:nth-child(4),
  body[data-page="stock"] table td:nth-child(4),
  body[data-page="stock"] table th:nth-child(7),
  body[data-page="stock"] table td:nth-child(7),
  body[data-page="stock"] table th:nth-child(9),
  body[data-page="stock"] table td:nth-child(9){display:none;}

  /* page-specific mobile tuning (P2P/Settings) */
  body[data-page="p2p"] .tableWrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  body[data-page="p2p"] table{min-width:520px;}

  body[data-page="settings"] .theme-colors{grid-template-columns:repeat(2,minmax(0,1fr));}
  body[data-page="settings"] .lt-grid{grid-template-columns:repeat(2,minmax(0,1fr));}

  /* keep stock table pinned to viewport width on mobile */
  body[data-page="stock"] .tableWrap{overflow-x:hidden;-webkit-overflow-scrolling:touch;}

  /* force full-width containers/panels for Orders & Stock on phones */
  body[data-page="orders"] #pageBody,
  body[data-page="stock"] #pageBody,
  body[data-page="orders"] .twoColPage,
  body[data-page="stock"] .twoColPage,
  body[data-page="orders"] .twoColPage > div,
  body[data-page="stock"] .twoColPage > div,
  body[data-page="orders"] .formPanel,
  body[data-page="stock"] .formPanel,
  body[data-page="orders"] .panel,
  body[data-page="stock"] .panel,
  body[data-page="orders"] .tableWrap,
  body[data-page="stock"] .tableWrap{width:100%;max-width:100%;min-width:0;box-sizing:border-box;}

  body[data-page="orders"] .inputBox,
  body[data-page="stock"] .inputBox,
  body[data-page="orders"] .inputBox input,
  body[data-page="stock"] .inputBox input,
  body[data-page="orders"] .inputBox select,
  body[data-page="stock"] .inputBox select{max-width:100%;min-width:0;}
}

  .lt-grid{grid-template-columns:1fr 1fr;}
  body[data-page="dashboard"] .kpis{grid-template-columns:repeat(2,minmax(0,1fr)) !important;align-items:start;}

/* ── CRM Pipeline Kanban ─────────────────────────────── */
.crm-pipeline { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,260px)); gap:10px; align-items:start; justify-content:start; min-width:0; }
@media(max-width:800px){ .crm-pipeline { grid-template-columns:repeat(2,1fr); } }
@media(max-width:500px){ .crm-pipeline { grid-template-columns:1fr; } }

.crm-main-grid{display:grid;grid-template-columns:1fr 340px 260px;gap:10px;align-items:start;}
.crm-supp-mini{display:flex;flex-direction:column;gap:6px;}
.crm-supp-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px 10px;}
.crm-supp-panel .panel-body{max-height:70vh;overflow:auto;}
@media(max-width:1200px){
  .crm-main-grid{grid-template-columns:1fr 320px;}
  .crm-form-col{grid-column:1 / -1;}
}
@media(max-width:900px){
  .crm-main-grid{grid-template-columns:1fr;}
  .crm-supp-panel .panel-body{max-height:none;}
}

.crm-col { background:var(--panel2); border-radius:var(--lt-radius); overflow:hidden; }
.crm-col-head { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-top:3px solid; }
.crm-cards { display:flex; flex-direction:column; gap:8px; padding:8px; min-height:80px; }
.crm-card { background:var(--panel); border:1px solid var(--line); border-radius:calc(var(--lt-radius) - 2px); padding:12px; cursor:default; transition:box-shadow var(--lt-tr); }
.crm-pipeline .crm-card { max-width:260px; width:100%; min-width:0; }
.crm-card:hover { box-shadow:var(--lt-shadow); }

  border-right: 1px solid color-mix(in srgb,var(--line) 92%, transparent);
  backdrop-filter: blur(18px);
  box-shadow: inset -1px 0 0 rgba(255,255,255,.02), 12px 0 30px rgba(0,0,0,.18);
}
[data-layout="pulse"] .brand,
[data-layout="pulse"] .sideFooter {
  background: linear-gradient(180deg, rgba(255,255,255,.03), transparent);
  border-color: color-mix(in srgb,var(--line) 92%, transparent);
}
[data-layout="pulse"] .logo {
  border-radius: 14px;
  box-shadow: 0 10px 24px color-mix(in srgb,var(--brand) 26%, transparent);
}
[data-layout="pulse"] .navBtn {
  border-radius: 18px;
  padding: 10px 10px;
  color: color-mix(in srgb,var(--text) 80%, var(--muted));
}
[data-layout="pulse"] .navBtn::before {
  width: 4px;
  border-radius: 0 8px 8px 0;
  background: linear-gradient(180deg,var(--brand),var(--brand2));
}
[data-layout="pulse"] .navBtn:hover,
[data-layout="pulse"] .navBtn.active {
  background: linear-gradient(180deg, color-mix(in srgb,var(--brand3) 72%, transparent), rgba(255,255,255,.02));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 10px 24px rgba(0,0,0,.14);
  border-color: color-mix(in srgb,var(--brand) 32%, transparent);
}
[data-layout="pulse"] .topbar,
[data-layout="pulse"] .mobileNav {
  background: color-mix(in srgb,var(--topbar-bg) 88%, transparent);
  backdrop-filter: blur(18px) saturate(130%);
  border-bottom-color: color-mix(in srgb,var(--line) 92%, transparent);
  box-shadow: 0 8px 28px rgba(0,0,0,.14);
}
[data-layout="pulse"] .searchBox,
[data-layout="pulse"] .seg,
[data-layout="pulse"] .pill,
[data-layout="pulse"] .rowBtn,
[data-layout="pulse"] .btn,
[data-layout="pulse"] .btn.secondary,
[data-layout="pulse"] .btn.ghost,
[data-layout="pulse"] .btn.danger,
[data-layout="pulse"] .input,
[data-layout="pulse"] .inp-field,
[data-layout="pulse"] select,
[data-layout="pulse"] textarea {

}
[data-layout="pulse"] .panel,
[data-layout="pulse"] .card,
[data-layout="pulse"] .tableWrap,
[data-layout="pulse"] .kpi-card,
[data-layout="pulse"] .kpi-band,
[data-layout="pulse"] .tj-panel,
[data-layout="pulse"] .modal {
  background:

    var(--panel);
  border: 1px solid color-mix(in srgb,var(--line) 96%, transparent);
  box-shadow: var(--lt-shadow2);
  backdrop-filter: blur(18px) saturate(135%);
}
[data-layout="pulse"] .panel:hover,
[data-layout="pulse"] .card:hover,
[data-layout="pulse"] .kpi-card:hover,
[data-layout="pulse"] .kpi-band:hover,
[data-layout="pulse"] .astat:hover,
[data-layout="pulse"] .cal-stat:hover {
  border-color: color-mix(in srgb,var(--brand) 34%, transparent);
  box-shadow: 0 18px 36px rgba(0,0,0,.18), 0 0 0 1px color-mix(in srgb,var(--brand2) 8%, transparent);
}
[data-layout="pulse"] .panel-head,
[data-layout="pulse"] .modalHead,
[data-layout="pulse"] .tableHead {
  border-color: color-mix(in srgb,var(--line) 96%, transparent);
  background: linear-gradient(180deg, rgba(255,255,255,.03), transparent);
}
[data-layout="pulse"] .kpi-band-grid { gap: 8px; margin-bottom: 8px; }
[data-layout="pulse"] .kpis { gap: 8px; }
[data-layout="pulse"] .kpi-band {
  position: relative;
  overflow: hidden;
  padding: 8px 10px;
  border-radius: 20px;
  min-height: 80px;
}
[data-layout="pulse"] .kpi-band::before,
[data-layout="pulse"] .kpi-card::before {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(300px 120px at 100% 0%, color-mix(in srgb,var(--brand2) 8%, transparent), transparent 70%);
  pointer-events:none;
}
[data-layout="pulse"] .kpi-band-title,
[data-layout="pulse"] .kpi-lbl {

[data-layout="pulse"] .kpi-period { color: var(--muted2); font-size: calc(6px * var(--ui-scale,1)); }

  font-size: calc(15px * var(--ui-scale,1));

[data-layout="pulse"] .kpi-card {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  min-height: 75px;

[data-layout="pulse"] .tc-btn,

[data-layout="pulse"] .crm-card,

/* ══ KPI DASHBOARD BUILDER ══════════════════════════════════════════
   Integrated My Dashboard page — persists in state.prefs
═══════════════════════════════════════════════════════════════════ */
.kdb-wrap{display:grid;grid-template-columns:1fr 320px;gap:0;min-height:60vh;}
@media(max-width:860px){.kdb-wrap{grid-template-columns:1fr;}}
.kdb-left{padding:4px 0 16px;}
.kdb-right{border-left:1px solid var(--line);padding:12px 14px;display:flex;flex-direction:column;gap:0;position:sticky;top:0;max-height:calc(100vh - 120px);overflow-y:auto;}

/* filter pills */
.kdb-filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.kdb-filter-lbl{font-size:calc(8px * var(--ui-scale,1));font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.kdb-pill{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:3px 10px;font-size:calc(9px * var(--ui-scale,1));font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.kdb-pill:hover{border-color:var(--brand);color:var(--brand);}
.kdb-pill.cat-on{background:var(--brand3);border-color:var(--brand);color:var(--brand);}
.kdb-pill.tab-on{background:color-mix(in srgb,var(--t5) 13%,transparent);border-color:color-mix(in srgb,var(--t5) 45%,transparent);color:var(--t5);}
.kdb-pill.new-on{background:color-mix(in srgb,var(--t2) 12%,transparent);border-color:color-mix(in srgb,var(--t2) 35%,transparent);color:var(--t2);}
.kdb-pill.mydb-pill-btn{background:color-mix(in srgb,#f472b6 13%,transparent);border-color:color-mix(in srgb,#f472b6 38%,transparent);color:#f472b6;font-weight:800;}
.kdb-pill.mydb-pill-on{background:color-mix(in srgb,#f472b6 22%,transparent);border-color:color-mix(in srgb,#f472b6 60%,transparent);color:#f9a8d4;box-shadow:0 0 0 2px color-mix(in srgb,#f472b6 14%,transparent);}
.kdb-sep{width:1px;height:18px;background:var(--line);flex-shrink:0;align-self:center;margin:0 4px;}

/* section */
.kdb-sec-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;margin-top:14px;}
.kdb-sec-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.kdb-sec-lbl{font-size:calc(8px * var(--ui-scale,1));font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);}
.kdb-sec-cnt{font-size:calc(8px * var(--ui-scale,1));color:var(--muted2,#334155);padding:1px 5px;border-radius:4px;background:var(--line);}
.kdb-sec-hint{font-size:calc(8px * var(--ui-scale,1));color:var(--muted);margin-left:auto;opacity:.7;}

/* card grid */
.kdb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:7px;margin-bottom:4px;}

/* kpi card */
.kdb-card{position:relative;background:var(--card-bg,var(--panel));border:1.5px solid var(--line);border-radius:var(--lt-radius,10px);padding:11px 12px;cursor:pointer;transition:all .15s;overflow:hidden;user-select:none;}
.kdb-card:hover{background:var(--hover-card);border-color:var(--brand);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);}
.kdb-card.kdb-active{background:color-mix(in srgb,var(--brand) 7%,var(--panel));border-color:var(--brand);box-shadow:0 0 0 3px var(--brand3,rgba(99,102,241,.1));}
.kdb-card.kdb-pinned{border-color:color-mix(in srgb,#f472b6 40%,var(--line));}
.kdb-accent{position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:10px 10px 0 0;opacity:0;transition:opacity .15s;}
.kdb-card.kdb-active .kdb-accent{opacity:1;}
.kdb-new-tag{position:absolute;top:6px;right:26px;font-size:calc(7px * var(--ui-scale,1));font-weight:800;letter-spacing:.8px;background:var(--brand);color:#fff;padding:2px 5px;border-radius:3px;text-transform:uppercase;}
.kdb-pin-btn{position:absolute;top:5px;right:5px;width:19px;height:19px;border-radius:4px;border:1px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;opacity:.25;z-index:2;padding:0;}
.kdb-pin-btn:hover{opacity:1;background:color-mix(in srgb,#f472b6 15%,transparent);border-color:color-mix(in srgb,#f472b6 40%,transparent);}
.kdb-pin-btn.pinned{opacity:1;color:#f472b6;background:color-mix(in srgb,#f472b6 13%,transparent);border-color:color-mix(in srgb,#f472b6 38%,transparent);}
.kdb-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;}
.kdb-icon{font-size:16px;line-height:1;flex-shrink:0;margin-top:1px;}
.kdb-meta{flex:1;min-width:0;}
.kdb-lbl{font-size:calc(8px * var(--ui-scale,1));font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;}
.kdb-val{font-size:calc(17px * var(--ui-scale,1));font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--muted);transition:color .15s;}
.kdb-card.kdb-active .kdb-val{color:inherit;}
.kdb-sub{font-size:calc(9px * var(--ui-scale,1));color:var(--muted);margin-top:2px;}
.kdb-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--line);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:8px;}
.kdb-card.kdb-active .kdb-check{color:#fff;}
.kdb-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:4px;}
.kdb-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:calc(8px * var(--ui-scale,1));font-weight:700;letter-spacing:.3px;border:1px solid;white-space:nowrap;}
.kdb-tab-badge{padding:1px 5px;border-radius:4px;font-size:calc(7px * var(--ui-scale,1));font-weight:700;background:var(--panel2);border:1px solid var(--line);color:var(--muted);}
.kdb-detail{background:color-mix(in srgb,var(--brand) 5%,var(--panel2));border:1px solid color-mix(in srgb,var(--brand) 18%,transparent);border-radius:0 0 10px 10px;padding:8px 11px;margin-top:-3px;display:none;font-size:calc(9px * var(--ui-scale,1));line-height:1.7;}
.kdb-detail.open{display:block;}
.kdb-detail .kdb-why{color:var(--brand);margin-bottom:3px;font-weight:600;}
.kdb-detail .kdb-formula{font-family:var(--lt-font-mono,'JetBrains Mono',monospace);font-size:calc(8px * var(--ui-scale,1));background:var(--panel2);padding:4px 8px;border-radius:4px;color:var(--good);margin-top:3px;word-break:break-all;}

/* My Dashboard view */
.kdb-mydb-view{display:none;}
.kdb-mydb-view.open{display:block;}
.kdb-mydb-empty{text-align:center;padding:36px 20px;border:1px dashed color-mix(in srgb,#f472b6 22%,transparent);border-radius:10px;color:var(--muted);line-height:1.9;}
.kdb-pin-row{display:flex;align-items:center;gap:9px;padding:8px 11px;background:color-mix(in srgb,#f472b6 5%,var(--panel));border:1px solid color-mix(in srgb,#f472b6 18%,transparent);border-radius:9px;cursor:pointer;transition:all .14s;margin-bottom:5px;}
.kdb-pin-row:hover{background:color-mix(in srgb,#f472b6 10%,var(--panel));border-color:color-mix(in srgb,#f472b6 32%,transparent);}

/* Default view selector */
.kdb-def-sel{background:color-mix(in srgb,#f472b6 5%,var(--panel2));border:1px solid color-mix(in srgb,#f472b6 20%,transparent);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.kdb-def-title{font-size:calc(8px * var(--ui-scale,1));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#f472b6;margin-bottom:3px;}
.kdb-def-sub{font-size:calc(9px * var(--ui-scale,1));color:var(--muted);margin-bottom:10px;line-height:1.5;}
.kdb-def-opt{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel);cursor:pointer;transition:all .14s;margin-bottom:5px;}
.kdb-def-opt:hover{border-color:color-mix(in srgb,#f472b6 30%,transparent);background:color-mix(in srgb,#f472b6 4%,var(--panel));}
.kdb-def-opt.sel{border-color:color-mix(in srgb,#f472b6 55%,transparent);background:color-mix(in srgb,#f472b6 9%,var(--panel));box-shadow:0 0 0 2px color-mix(in srgb,#f472b6 12%,transparent);}
.kdb-def-radio{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .14s;}
.kdb-def-opt.sel .kdb-def-radio{border-color:#f472b6;background:#f472b6;}
.kdb-def-dot{width:5px;height:5px;border-radius:50%;background:#fff;opacity:0;transition:opacity .14s;}
.kdb-def-opt.sel .kdb-def-dot{opacity:1;}
.kdb-def-name{font-size:calc(10px * var(--ui-scale,1));font-weight:700;color:var(--text);}
.kdb-def-desc{font-size:calc(8px * var(--ui-scale,1));color:var(--muted);margin-top:1px;}
.kdb-active-tag{font-size:calc(8px * var(--ui-scale,1));font-weight:700;padding:2px 8px;border-radius:999px;background:color-mix(in srgb,var(--good) 10%,transparent);border:1px solid color-mix(in srgb,var(--good) 25%,transparent);color:var(--good);white-space:nowrap;}

/* right preview */
.kdb-prev-hdr{font-size:calc(8px * var(--ui-scale,1));font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;}
.kdb-prev-sub{font-size:calc(9px * var(--ui-scale,1));color:var(--muted);margin-bottom:8px;}
.kdb-prev-tile{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;position:relative;overflow:hidden;margin-bottom:4px;display:flex;align-items:center;gap:7px;transition:border-color .14s;cursor:pointer;}
.kdb-prev-tile:hover{border-color:var(--bad);}
.kdb-prev-tile.mydb-tile{border-color:color-mix(in srgb,#f472b6 22%,transparent);}
.kdb-prev-tile .kdb-sb{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:9px 0 0 9px;}
.kdb-prev-body{padding-left:4px;flex:1;min-width:0;}
.kdb-prev-lbl{font-size:calc(8px * var(--ui-scale,1));font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;display:flex;justify-content:space-between;align-items:center;}
.kdb-prev-val{font-size:calc(14px * var(--ui-scale,1));font-weight:800;letter-spacing:-.03em;line-height:1;}
.kdb-prev-sub2{font-size:calc(8px * var(--ui-scale,1));color:var(--muted);margin-top:1px;}
.kdb-prev-empty{text-align:center;padding:20px 12px;border:1px dashed var(--line);border-radius:9px;color:var(--muted);font-size:calc(9px * var(--ui-scale,1));line-height:1.7;}
.kdb-prev-empty a{color:var(--brand);cursor:pointer;}
.kdb-act-row{display:flex;gap:6px;margin-top:8px;}
.kdb-divider{border:none;border-top:1px solid var(--line);margin:10px 0;}
.kdb-notes{padding:10px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;font-size:calc(8px * var(--ui-scale,1));color:var(--muted);line-height:1.9;margin-top:auto;}
.kdb-notes-title{font-size:calc(7px * var(--ui-scale,1));font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.kdb-notes code{color:var(--brand);font-family:var(--lt-font-mono,'JetBrains Mono',monospace);}
</style>

  <script>
  ;(function(){
    var cv=document.getElementById('ql-stars');
    if(!cv)return;
    var ctx=cv.getContext('2d');
    function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
    rsz();window.addEventListener('resize',rsz);
    var ss=Array.from({length:190},function(){return{x:Math.random(),y:Math.random()*.6,r:Math.random()*1.5+.3,o:Math.random()*.65+.2,s:Math.random()*.005+.001,ph:Math.random()*Math.PI*2};});
    var t=0;
    (function draw(){
      ctx.clearRect(0,0,cv.width,cv.height);
      ss.forEach(function(s){var fl=.5+.5*Math.sin(t*s.s*50+s.ph);ctx.beginPath();ctx.arc(s.x*cv.width,s.y*cv.height,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,252,215,'+(s.o*fl)+')';ctx.fill();});
      t+=.016;requestAnimationFrame(draw);
    })();
    var dp=document.getElementById('ql-dust');
    if(dp){for(var i=0;i<20;i++){var el=document.createElement('div');var sz=(Math.random()*3.5+2)+'px';var dx=(Math.random()*70-35)+'px';var g=Math.random()>.45;el.style.cssText='position:absolute;bottom:-6px;left:'+(Math.random()*100)+'%;width:'+sz+';height:'+sz+';border-radius:50%;background:rgba('+(g?'201,168,76':'255,210,100')+','+(Math.random()*.45+.15)+');--dx:'+dx+';animation:ql-float '+(Math.random()*7+9)+'s '+(Math.random()*10)+'s infinite ease-in-out;';dp.appendChild(el);}}

<script>
(()=>{
"use strict";
const SK="usdt_pro_v15";
const PCOLORS=["#45B8C8","#E05252","#F5A623","#5B9BD5","#E8835A","#2ECC71","#9B59B6","#F0C040","#1ABC9C","#2E4A6B"];

// ── HELPERS ──────────────────────────────────────────────────────
function $(s, r){
  try{
    r = r || document;
    if (typeof s !== "string") return s;
    var ss = (s || "").trim();
    if (!ss) return null;

    // If it's not obviously a CSS selector, try getElementById first (legacy calls pass id without '#')
    if (ss[0] !== "#" && ss[0] !== "." && ss[0] !== "[" &&
        ss.indexOf(" ") === -1 && ss.indexOf(">") === -1 &&
        ss.indexOf(":") === -1 && ss.indexOf("+") === -1 &&
        ss.indexOf("~") === -1 && ss.indexOf(",") === -1) {
      var byId = (r.getElementById ? r.getElementById(ss) : null);
      if (byId) return byId;
    }
    return r.querySelector(ss);
  } catch(e){ return null; }
}
const $$=(s,r=document)=>[...r.querySelectorAll(s)];

function setupMobileSidebar(){
  const toggleBtn = $("#sidebarToggleBtn");
  const backdrop = $("#sidebarBackdrop");
  const sidebar = $("#sidebar");
  if(!toggleBtn || !backdrop || !sidebar) return;
  const closeSidebar=()=>document.body.classList.remove("sidebar-open");
  const toggleSidebar=()=>document.body.classList.toggle("sidebar-open");
  toggleBtn.addEventListener("click", toggleSidebar);
  backdrop.addEventListener("click", closeSidebar);
  sidebar.addEventListener("click", e=>{ if(e.target.closest(".navBtn")) closeSidebar(); });
  window.addEventListener("resize", ()=>{ if(window.innerWidth>768) closeSidebar(); });
}
setupMobileSidebar();

function setupDynamicViewportHeight(){
  const root = document.documentElement;
  let raf = 0;
  const setHeight = () => {
    raf = 0;
    const vv = window.visualViewport;
    const h = Math.max(320, Math.round((vv && vv.height) ? vv.height : window.innerHeight || 0));
    root.style.setProperty("--app-vh", h + "px");
  };
  const queue = () => {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(setHeight);
  };
  setHeight();
  window.addEventListener("resize", queue, { passive:true });
  window.addEventListener("orientationchange", () => { queue(); setTimeout(queue, 120); setTimeout(queue, 360); }, { passive:true });
  window.addEventListener("pageshow", queue, { passive:true });
  document.addEventListener("visibilitychange", () => { if (!document.hidden) queue(); }, { passive:true });
  if (window.visualViewport) {
    visualViewport.addEventListener("resize", queue, { passive:true });
    visualViewport.addEventListener("scroll", queue, { passive:true });
  }
}
setupDynamicViewportHeight();

function setupMobileTopbarAutoHide(){
  const scrollEl = $("#pageScroll");
  const topbar = $(".topbar");
  if(!scrollEl || !topbar) return;

  const isMobile = () => window.innerWidth <= 900;
  const showTopbar = () => document.body.classList.remove("mobile-topbar-hidden");
  const syncTopbarHeight = () => {
    const topbarH = Math.max(0, Math.round(topbar.getBoundingClientRect().height || topbar.offsetHeight || 0));
    document.documentElement.style.setProperty("--mobile-topbar-offset", isMobile() ? (topbarH + "px") : "0px");
    document.documentElement.style.setProperty("--mobile-topbar-compensation", "0px");
  };
  const apply = () => {
    showTopbar();
    syncTopbarHeight();
  };

  scrollEl.addEventListener("scroll", showTopbar, { passive:true });
  window.addEventListener("resize", () => { apply(); }, { passive:true });
  window.addEventListener("orientationchange", () => { setTimeout(apply, 120); }, { passive:true });
  window.addEventListener("pageshow", () => { setTimeout(apply, 60); }, { passive:true });
  document.addEventListener("visibilitychange", () => { if (!document.hidden) apply(); }, { passive:true });
  document.addEventListener("click", () => {
    if (document.body.classList.contains("sidebar-open")) showTopbar();
  }, true);

  syncTopbarHeight();
  showTopbar();
  requestAnimationFrame(() => requestAnimationFrame(apply));
}
setupMobileTopbarAutoHide();

const uid=()=>Math.random().toString(16).slice(2)+Date.now().toString(16);
const num=(v,d=0)=>{const n=Number(String(v||"").replace(/,/g,"").trim());return Number.isFinite(n)?n:d;};
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const normName=s=>String(s||"").trim().replace(/\s+/g," ").toLowerCase();
const normalizePhoneKey=phone=>{
  let raw=String(phone||"").trim();
  if(!raw)return"";
  raw=raw.replace(/ /g," ").replace(/[\s\-().]+/g,"");
  if(raw.startsWith("00"))raw="+"+raw.slice(2);
  const hasPlus=raw.startsWith("+");
  raw=(hasPlus?"+":"")+raw.replace(/[^\d]/g,"");
  let digits=raw.replace(/\D/g,"");
  if(!digits)return"";
  if(digits.length===8)return"974"+digits;
  if(digits.length===11&&digits.startsWith("974"))return digits;
  return digits;
};
function ensureArchivedSuppliers(){
  state.archivedSuppliers=Array.isArray(state.archivedSuppliers)?state.archivedSuppliers:[];
  return state.archivedSuppliers;
}
function isSupplierArchivedName(name){
  const key=normName(name);
  return !!key&&ensureArchivedSuppliers().includes(key);
}
function archiveSupplierName(name){
  const key=normName(name);
  if(!key)return;
  const arr=ensureArchivedSuppliers();
  if(!arr.includes(key))arr.push(key);
}
function unarchiveSupplierName(name){
  const key=normName(name);
  if(!key)return;
  state.archivedSuppliers=ensureArchivedSuppliers().filter(k=>k!==key);
}
function getSupplierLinkedBatchCount(name){
  const key=normName(name);
  if(!key)return 0;
  return (state.batches||[]).filter(b=>normName(b.source)===key).length;
}
function findSupplierPhoneDuplicate(phone,excludeId=""){
  const key=normalizePhoneKey(phone);
  if(!key)return null;
  state.suppliers=Array.isArray(state.suppliers)?state.suppliers:[];
  return state.suppliers.find(s=>String(s.id||"")!==String(excludeId||"")&&normalizePhoneKey(s.phone)===key)||null;
}
function findSupplierProfileDuplicateByName(name,excludeId=""){
  const key=normName(name);
  if(!key)return null;
  state.suppliers=Array.isArray(state.suppliers)?state.suppliers:[];
  return state.suppliers.find(s=>String(s.id||"")!==String(excludeId||"")&&normName(s.name)===key)||null;
}
function supplierNameExistsInHistory(name,excludeName=""){
  const key=normName(name),skip=normName(excludeName);
  if(!key)return false;
  return (state.batches||[]).some(b=>{
    const cur=normName(b.source);
    return cur&&cur!==skip&&cur===key;
  });
}
function validateSupplierProfileInput({id="",oldName="",name="",phone=""}){
  const cleanName=String(name||"").trim().replace(/\s+/g," ");
  const cleanPhone=String(phone||"").trim();
  const errors=[];
  if(!cleanName)errors.push("Supplier name is required.");
  if(!cleanPhone)errors.push("Phone number is required.");
  const dupPhone=cleanPhone?findSupplierPhoneDuplicate(cleanPhone,id):null;
  if(dupPhone)errors.push("Phone number already exists for "+dupPhone.name+".");
  const dupName=findSupplierProfileDuplicateByName(cleanName,id);
  if(dupName&&normName(dupName.name)!==normName(oldName))errors.push("Supplier name already exists.");
  if(cleanName&&oldName&&normName(cleanName)!==normName(oldName)&&supplierNameExistsInHistory(cleanName,oldName))errors.push("Another supplier already uses this name in batch history.");
  return {ok:!errors.length,name:cleanName,phone:cleanPhone,message:errors.join(" ")};
}
function upsertSupplierProfile({id="",oldName="",name="",phone="",typicalPrice=0,notes=""}){
  const check=validateSupplierProfileInput({id,oldName,name,phone});
  if(!check.ok)return{ok:false,message:check.message};
  state.suppliers=Array.isArray(state.suppliers)?state.suppliers:[];
  const oldKey=normName(oldName||"");
  let idx=state.suppliers.findIndex(s=>String(s.id||"")===String(id||""));
  if(idx<0&&oldKey)idx=state.suppliers.findIndex(s=>normName(s.name)===oldKey);
  const base=idx>=0?state.suppliers[idx]:{id:id||uid(),createdAt:Date.now()};
  const next={
    ...base,
    id:String(base.id||id||uid()),
    name:check.name,
    phone:check.phone,
    typicalPrice:num(typicalPrice,0),
    notes:String(notes||base.notes||""),
    createdAt:num(base.createdAt,Date.now())
  };
  if(idx>=0)state.suppliers[idx]=next;
  else state.suppliers.push(next);
  unarchiveSupplierName(next.name);
  let renamedBatchCount=0;
  if(oldKey&&oldKey!==normName(next.name)){
    (state.batches||[]).forEach(b=>{
      if(normName(b.source)===oldKey){
        b.source=next.name;
        renamedBatchCount++;
      }
    });
  }
  return {ok:true,supplier:next,renamedBatchCount};
}
function ensureCustomerRecord({name,phone="",tier="C",dailyLimitUSDT=0,notes=""}){
  const nm=String(name||"").trim().replace(/\s+/g," ");
  if(!nm)return"";
  state.customers=Array.isArray(state.customers)?state.customers:[];
  const key=normName(nm),ph=String(phone||"").replace(/\s+/g,"");
  const ex=state.customers.find(c=>normName(c.name)===key||(ph&&String(c.phone||"").replace(/\s+/g,"")===ph));
  if(ex)return ex.id;
  const c={id:uid(),name:nm,phone:String(phone||""),tier:["A","B","C","D"].includes(tier)?tier:"C",dailyLimitUSDT:num(dailyLimitUSDT,0),notes:String(notes||""),createdAt:Date.now()};
