  // Shared searchable dropdown, rendered in a floating portal so parent panels and modals never clip it.
  window.wireLookupDropdown = function wireLookupDropdownV2(cfg){
    var shell = document.getElementById(cfg.shellId);
    var input = document.getElementById(cfg.inputId);
    var menu = document.getElementById(cfg.menuId);
    var hidden = cfg.hiddenId ? document.getElementById(cfg.hiddenId) : null;
    if (!shell || !input || !menu) return { refresh:function(){}, open:function(){}, close:function(){}, toggle:function(){} };

    if (menu.parentElement !== document.body) document.body.appendChild(menu);
    menu.classList.add('lookup-portal');
    menu.setAttribute('role', 'listbox');
    menu.setAttribute('aria-hidden', 'true');
    input.setAttribute('autocomplete', 'off');

    var items = [];
    var filtered = [];
    var openState = false;
    var activeIndex = -1;

    function refreshSource(){
      try { items = (typeof cfg.getItems === 'function' ? cfg.getItems() : []).filter(Boolean); }
      catch(e){ items = []; }
    }
    function searchText(item){
      return norm(typeof cfg.getSearchText === 'function' ? cfg.getSearchText(item) : (typeof cfg.getValue === 'function' ? cfg.getValue(item) : ''));
    }
    function exactSync(){
      if (!hidden) return;
      var typed = norm(input.value);
      var match = items.find(function(item){ return norm(cfg.getValue(item)) === typed; });
      hidden.value = match && match.id ? match.id : '';
    }
    function positionMenu(){
      if (!openState) return;
      var rect = shell.getBoundingClientRect();
      var vw = window.innerWidth || document.documentElement.clientWidth || 0;
      var vh = window.innerHeight || document.documentElement.clientHeight || 0;
      var preferred = Math.max(rect.width, 360);
      var width = Math.min(Math.max(260, preferred), vw - 20);
      var left = Math.max(10, Math.min(rect.left, vw - width - 10));
      var spaceBelow = vh - rect.bottom - 10;
      var spaceAbove = rect.top - 10;
      var openUp = spaceBelow < 220 && spaceAbove > spaceBelow;
      var maxHeight = Math.max(180, Math.min(360, openUp ? spaceAbove : spaceBelow));
      menu.style.width = width + 'px';
      menu.style.maxHeight = maxHeight + 'px';
      menu.style.left = Math.round(left) + 'px';
      menu.style.top = openUp ? Math.round(Math.max(10, rect.top - Math.min(maxHeight, menu.offsetHeight || maxHeight) - 6)) + 'px' : Math.round(rect.bottom + 6) + 'px';
    }
    function highlight(idx){
      activeIndex = idx;
      qsa('.lookupItem', menu).forEach(function(btn, i){
        btn.dataset.active = i === idx ? '1' : '0';
        if (i === idx) {
          try { btn.scrollIntoView({ block:'nearest' }); } catch(e) {}
        }
      });
    }
    function close(){
      openState = false;
      menu.classList.remove('open');
      shell.classList.remove('open');
      menu.setAttribute('aria-hidden', 'true');
      activeIndex = -1;
    }
    function selectIndex(idx){
      var item = filtered[idx];
      if (!item) return;
      input.value = cfg.getValue(item) || '';
      if (hidden) hidden.value = item.id || '';
      if (typeof cfg.onSelect === 'function') cfg.onSelect(item);
      close();
      try { input.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
    }
    function render(query){
      refreshSource();
      var q = norm(query || '');
      filtered = !q ? items.slice() : items.filter(function(item){ return searchText(item).indexOf(q) >= 0; });
      if (!filtered.length) {
        var ttl = typeof cfg.emptyTitle === 'function' ? cfg.emptyTitle(query || '') : (cfg.emptyTitle || 'No matches');
        var sub = typeof cfg.emptySub === 'function' ? cfg.emptySub(query || '') : (cfg.emptySub || 'Keep typing or use the add button.');
        menu.innerHTML = '<div class="lookupEmpty"><div class="lookupEmptyTitle">' + escHtml(ttl) + '</div><div class="lookupEmptySub">' + escHtml(sub) + '</div></div>';
        if ((query || '').trim()) {
          openState = true;
          menu.classList.add('open');
          shell.classList.add('open');
          menu.setAttribute('aria-hidden', 'false');
          positionMenu();
        } else {
          close();
        }
        return;
      }
      menu.innerHTML = filtered.map(function(item, idx){
        var name = safe(cfg.getValue(item)).trim();
        var meta = typeof cfg.getMeta === 'function' ? safe(cfg.getMeta(item) || '') : '';
        var badge = typeof cfg.getBadge === 'function' ? safe(cfg.getBadge(item) || '') : '';
        return '<button type="button" class="lookupItem" data-idx="' + idx + '" title="' + escHtml(name) + '">' +
          '<span class="lookupMain"><span class="lookupName" title="' + escHtml(name) + '">' + escHtml(name) + '</span><span class="lookupMeta" title="' + escHtml(meta) + '">' + escHtml(meta) + '</span></span>' +
          (badge ? '<span class="lookupBadge">' + escHtml(badge) + '</span>' : '') +
          '</button>';
      }).join('');
      qsa('.lookupItem', menu).forEach(function(btn){
        btn.addEventListener('mousedown', function(e){ e.preventDefault(); });
        btn.addEventListener('click', function(){ selectIndex(Number(btn.getAttribute('data-idx')) || 0); });
      });
      openState = true;
      menu.classList.add('open');
      shell.classList.add('open');
      menu.setAttribute('aria-hidden', 'false');
      positionMenu();
      highlight(filtered.length ? 0 : -1);
    }
    function open(){ render(input.value || ''); }
    function toggle(){ if (openState) close(); else open(); }

    input.addEventListener('focus', function(){ render(input.value || ''); });
    input.addEventListener('input', function(){ exactSync(); render(input.value || ''); });
    input.addEventListener('change', exactSync);
    input.addEventListener('keydown', function(e){
      if (!openState && (e.key === 'ArrowDown' || e.key === 'Enter')) { e.preventDefault(); open(); return; }
      if (!openState) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); highlight(Math.min(filtered.length - 1, activeIndex + 1)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); highlight(Math.max(0, activeIndex - 1)); }
      else if (e.key === 'Enter') { if (activeIndex >= 0) { e.preventDefault(); selectIndex(activeIndex); } }
      else if (e.key === 'Escape') { e.preventDefault(); close(); }
    });
    document.addEventListener('click', function(e){ if (!shell.contains(e.target) && !menu.contains(e.target)) close(); }, true);
    window.addEventListener('resize', positionMenu, { passive:true });
    window.addEventListener('scroll', positionMenu, { passive:true, capture:true });
    return { refresh:function(){ render(input.value || ''); }, open:open, close:close, toggle:toggle };
  };

  function computeSevenDayRoi(){
    var today = new Date();
    today.setHours(23,59,59,999);
    var dayMs = 86400000;
    var deployedSeries = [];
    for (var i = 6; i >= 0; i -= 1) {
      var endTs = today.getTime() - (i * dayMs);
      try {
        var snap = {
          trades: (state.trades || []).filter(function(t){ return !t.voided && Number(t.ts || 0) <= endTs; }),
          batches: (state.batches || []).filter(function(b){ return Number(b.ts || 0) <= endTs; }),
          customers: state.customers || [],
          suppliers: state.suppliers || [],
          prefs: state.prefs || {},
          settings: state.settings || {},
          cashQAR: state.cashQAR || 0,
          cashOwner: state.cashOwner || ''
        };
        var snapDerived = recomputeFor(snap);
        var stockCost = (snapDerived && Array.isArray(snapDerived.batches))
          ? snapDerived.batches.reduce(function(sum, b){ return sum + ((Number(b.remainingUSDT)||0) * (Number(b.buyPriceQAR)||0)); }, 0)
          : 0;
        deployedSeries.push(stockCost);
      } catch (e) {
        deployedSeries.push(0);
      }
    }
    var avgDeployed = deployedSeries.length ? deployedSeries.reduce(function(sum, v){ return sum + v; }, 0) / deployedSeries.length : 0;
    var net7 = fmtMaybe(function(){ return _kpiFor('7d').net || 0; }, 0);
    return {
      netQAR: net7,
      avgDeployedQAR: avgDeployed,
      pct: avgDeployed > 0 ? (net7 / avgDeployed) * 100 : null
    };
  }

  function crm6EnsureMeta(rec, kind){
    if (!rec || typeof rec !== 'object') return rec;
    if (rec.status == null) rec.status = 'active';
    if (['active','inactive','blocked'].indexOf(String(rec.status)) < 0) rec.status = 'active';
    if (rec.location == null) rec.location = '';

    if (rec.createdAt == null) rec.createdAt = Date.now();
    if (rec.updatedAt == null) rec.updatedAt = Number(rec.createdAt) || Date.now();
    if (kind === 'customer') {
      if (!['A','B','C','D'].includes(String(rec.tier || ''))) rec.tier = 'C';

    }

  function crm6EnsureData(){
    state.customers = Array.isArray(state.customers) ? state.customers : [];
    state.suppliers = Array.isArray(state.suppliers) ? state.suppliers : [];
    (state.customers || []).forEach(function(c){ crm6EnsureMeta(c, 'customer'); });
    (state.suppliers || []).forEach(function(s){ crm6EnsureMeta(s, 'supplier'); });
    (state.batches || []).forEach(function(b){

      if (!found) state.suppliers.push(crm6EnsureMeta({ id: uid(), name:nm, phone:'', location:'', notes:'', createdAt:Date.now(), updatedAt:Date.now(), status:'active' }, 'supplier'));

  function crm6CustomerMetrics(cu){
    var out = { count:0, volume:0, net:0, lastTs:0, trades:[] };
    (state.trades || []).forEach(function(t){
      if (!t || t.voided || String(t.customerId || '') !== String(cu.id || '')) return;
      out.count += 1;
      out.volume += Number(t.amountUSDT) || 0;
      out.lastTs = Math.max(out.lastTs, Number(t.ts) || 0);
      var calc = derived && derived.tradeCalc ? derived.tradeCalc.get(t.id) : null;
      if (calc && calc.ok) out.net += Number(calc.netQAR) || 0;
      out.trades.push(t);
    });
    out.trades.sort(function(a,b){ return (Number(b.ts)||0) - (Number(a.ts)||0); });
    return out;
  }
  function crm6SupplierMetrics(su){
    var batches = (state.batches || []).filter(function(b){ return norm(b && b.source) === norm(su.name); }).sort(function(a,b){ return (Number(b.ts)||0) - (Number(a.ts)||0); });
    var stats = { batchCount:batches.length, volume:0, avgBuy:0, lastTs:0, remaining:0, consumed:0, linkedTrades:0, net:0, batches:batches };
    if (typeof crmSupplierStatsByName === 'function') {
      var s = crmSupplierStatsByName(su.name) || {};
      stats.volume = Number(s.boughtUSDT) || 0;
      stats.avgBuy = Number(s.avgBuyQAR) || 0;
      stats.lastTs = Number(s.lastBatchTs) || 0;
      stats.remaining = Number(s.remainingUSDT) || 0;
      stats.consumed = Number(s.consumedUSDT) || 0;
      stats.linkedTrades = Number(s.tradesCount) || 0;
      stats.net = Number(s.netQAR) || 0;
    } else {
      batches.forEach(function(b){
        stats.volume += Number(b.initialUSDT) || 0;
        stats.lastTs = Math.max(stats.lastTs, Number(b.ts) || 0);
      });
      stats.avgBuy = stats.volume > 0 ? batches.reduce(function(sum, b){ return sum + ((Number(b.initialUSDT)||0) * (Number(b.buyPriceQAR)||0)); }, 0) / stats.volume : 0;
    }
    return stats;
  }

      return '<div class="crm6-panel"><div class="crm6-panel-hd"><div style="min-width:0;"><div class="crm6-title">Supplier Details</div><div class="crm6-subtitle">' + escHtml(srec.name) + ' · ' + escHtml(srec.location || 'No location') + '</div></div><div class="crm6-actions"><button class="rowBtn" data-crm6-act="history" data-kind="suppliers" data-id="' + escHtml(srec.id) + '">View History</button><button class="rowBtn" data-crm6-act="edit" data-kind="suppliers" data-id="' + escHtml(srec.id) + '">Edit</button><button class="rowBtn" style="color:var(--good);border-color:var(--good);" data-crm6-act="batch" data-id="' + escHtml(srec.id) + '">New Batch</button></div></div><div class="crm6-detail-body"><div class="crm6-summary-grid"><div class="crm6-summary-box"><div class="k">Tier</div><div class="v">' + escHtml(crm6TierMeta(crm6SuggestedTier(sm.volume, srec.status)).label) + '</div></div><div class="crm6-summary-box"><div class="k">Batch Count</div><div class="v">' + escHtml(String(sm.batchCount)) + '</div></div><div class="crm6-summary-box"><div class="k">USDT Volume</div><div class="v">' + escHtml(fmtU(sm.volume,0)) + '</div></div><div class="crm6-summary-box"><div class="k">Avg Cost</div><div class="v">' + escHtml(fmtP(sm.avgBuy)) + '</div></div><div class="crm6-summary-box"><div class="k">Remaining</div><div class="v">' + escHtml(fmtU(sm.remaining,0)) + '</div></div><div class="crm6-summary-box"><div class="k">Consumed</div><div class="v">' + escHtml(fmtU(sm.consumed,0)) + '</div></div><div class="crm6-summary-box"><div class="k">Trades Touched</div><div class="v">' + escHtml(String(sm.linkedTrades)) + '</div></div><div class="crm6-summary-box"><div class="k">Allocated Net</div><div class="v" style="color:' + (sm.net >= 0 ? 'var(--good)' : 'var(--bad)') + '">' + escHtml((sm.net >= 0 ? '+' : '') + fmtQ(sm.net)) + '</div></div></div><div class="muted" style="font-size:10px;">Supplier metrics come from stock batches and FIFO allocation, not mirrored customer trade P&amp;L.</div><div class="crm6-history-wrap"><table class="crm6-history-table"><thead><tr><th>Date</th><th>Qty</th><th>Buy</th><th>Remaining</th><th>Jump</th></tr></thead><tbody>' + srows + '</tbody></table></div></div></div>';
    }

    var pb = document.getElementById('pageBody');
    if (!pb) return;
    pb.innerHTML = '<div class="crm6-shell">' +
      '<div class="crm6-top">' +
        '<div class="crm6-tabrow"><button type="button" class="crm6-tab ' + (currentTab === 'customers' ? 'on' : '') + '" data-crm6-tab="customers">Customers</button><button type="button" class="crm6-tab ' + (currentTab === 'suppliers' ? 'on' : '') + '" data-crm6-tab="suppliers">Suppliers</button><span class="pill">Search and filters are UI-only, no autosave</span></div>' +
        '<div class="crm6-kpi-grid">' +
          '<span class="pill">Customer Trades ' + escHtml(String(customerTotals.count)) + '</span>' +
          '<span class="pill">Customer Volume ' + escHtml(fmtU(customerTotals.volume,0)) + '</span>' +
          '<span class="pill">Customer Net ' + escHtml((customerTotals.net >= 0 ? '+' : '') + fmtQ(customerTotals.net)) + '</span>' +
          '<span class="pill">Supplier Batches ' + escHtml(String(supplierTotals.count)) + '</span>' +
          '<span class="pill">Supplied ' + escHtml(fmtU(supplierTotals.volume,0)) + '</span>' +
          '<span class="pill">Allocated Net ' + escHtml((supplierTotals.net >= 0 ? '+' : '') + fmtQ(supplierTotals.net)) + '</span>' +
        '</div>' +
        '<div class="crm6-filter-grid">' +
          '<div class="crm6-field"><div class="crm6-label">Search</div><input id="crm6_q" value="' + escHtml(filters.q || '') + '" placeholder="Search name, phone, location"/></div>' +
          '<div class="crm6-field"><div class="crm6-label">Entity Type</div><select id="crm6_entity"><option value="all"' + (entityFilter === 'all' ? ' selected' : '') + '>All</option><option value="customers"' + (entityFilter === 'customers' ? ' selected' : '') + '>Customers</option><option value="suppliers"' + (entityFilter === 'suppliers' ? ' selected' : '') + '>Suppliers</option></select></div>' +
          '<div class="crm6-field"><div class="crm6-label">Status</div><select id="crm6_status_f"><option value="all"' + (filters.status === 'all' ? ' selected' : '') + '>All</option><option value="active"' + (filters.status === 'active' ? ' selected' : '') + '>Active</option><option value="inactive"' + (filters.status === 'inactive' ? ' selected' : '') + '>Inactive</option><option value="blocked"' + (filters.status === 'blocked' ? ' selected' : '') + '>Blocked</option></select></div>' +
          '<div class="crm6-field"><div class="crm6-label">Tier</div><select id="crm6_tier_f"><option value="all"' + (filters.tier === 'all' ? ' selected' : '') + '>All</option>' + ['A','B','C','D'].map(function(k){ return '<option value="' + k + '"' + (filters.tier === k ? ' selected' : '') + '>' + crm6TierMeta(k).label + '</option>'; }).join('') + '</select></div>' +
          '<div class="crm6-field"><div class="crm6-label">Location</div><select id="crm6_location_f"><option value="all"' + (filters.location === 'all' ? ' selected' : '') + '>All</option>' + locations.map(function(l){ return '<option value="' + escHtml(l) + '"' + (filters.location === l ? ' selected' : '') + '>' + escHtml(l) + '</option>'; }).join('') + '</select></div>' +
          '<div class="crm6-field"><div class="crm6-label">Volume Range</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><input id="crm6_minVol" inputmode="decimal" placeholder="Min" value="' + escHtml(filters.minVol || '') + '"/><input id="crm6_maxVol" inputmode="decimal" placeholder="Max" value="' + escHtml(filters.maxVol || '') + '"/></div></div>' +
          '<div style="display:flex;gap:8px;align-items:end;"><button class="btn" id="crm6_addBtn">' + (currentTab === 'customers' ? 'New Customer' : 'New Supplier') + '</button><span class="crm6-count">' + escHtml(String(activeList.length)) + '</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="crm6-layout"><div class="crm6-panel"><div class="crm6-panel-hd"><div><div class="crm6-title">' + escHtml(currentTab === 'customers' ? 'Customers' : 'Suppliers') + '</div><div class="crm6-subtitle">Desktop table, mobile cards, sortable columns</div></div><span class="pill">' + escHtml(String(activeList.length)) + ' results</span></div>' + listHtml + '</div>' + detailHtml() + '</div>' +
    '</div>';

    qsa('[data-crm6-tab]').forEach(function(btn){
      btn.addEventListener('click', function(){ store.tab = btn.getAttribute('data-crm6-tab') === 'suppliers' ? 'suppliers' : 'customers'; if (store.filters.entity !== 'all') store.filters.entity = store.tab; renderCRMV6(); });
    });
    var debouncedSearch = debounce(function(v){ store.filters.q = v; renderCRMV6(); }, 300);
    var qEl = qs('#crm6_q'); if (qEl) qEl.addEventListener('input', function(){ debouncedSearch(qEl.value); });
    [['#crm6_entity','entity'],['#crm6_status_f','status'],['#crm6_tier_f','tier'],['#crm6_location_f','location'],['#crm6_minVol','minVol'],['#crm6_maxVol','maxVol']].forEach(function(pair){
      var el = qs(pair[0]);
      if (!el) return;
      var handler = function(){ store.filters[pair[1]] = el.value; if (pair[1] === 'entity' && (el.value === 'customers' || el.value === 'suppliers')) store.tab = el.value; renderCRMV6(); };
      el.addEventListener('change', handler);
      if (pair[1] === 'minVol' || pair[1] === 'maxVol') el.addEventListener('input', handler);
    });
    var addBtn = qs('#crm6_addBtn'); if (addBtn) addBtn.addEventListener('click', function(){ crm6OpenAdd(currentTab); });
    qsa('[data-crm6-open]').forEach(function(row){ row.addEventListener('click', function(e){ if (e.target.closest('[data-crm6-act]') || e.target.closest('[data-crm6-copy]') || e.target.closest('[data-crm6-call]') || e.target.closest('[data-crm6-open-trade]') || e.target.closest('[data-crm6-open-batch]')) return; var parts = safe(row.getAttribute('data-crm6-open')).split(':'); store.tab = parts[0] || currentTab; store.selected[store.tab] = parts[1] || ''; renderCRMV6(); }); });
    qsa('[data-crm6-sort]').forEach(function(btn){ btn.addEventListener('click', function(e){ e.preventDefault(); var bits = safe(btn.getAttribute('data-crm6-sort')).split(':'); var kind = bits[0], key = bits[1]; var s = store.sort[kind]; if (s.key === key) s.dir = s.dir === 'asc' ? 'desc' : 'asc'; else { s.key = key; s.dir = (key === 'name' || key === 'tier' || key === 'status') ? 'asc' : 'desc'; } renderCRMV6(); }); });
    qsa('[data-crm6-copy]').forEach(function(btn){ btn.addEventListener('click', function(e){ e.stopPropagation(); crm6Copy(btn.getAttribute('data-crm6-copy')); }); });
    qsa('[data-crm6-call]').forEach(function(btn){ btn.addEventListener('click', function(e){ e.stopPropagation(); var phone = safe(btn.getAttribute('data-crm6-call')).trim(); if (phone) window.location.href = 'tel:' + phone; }); });
    qsa('[data-crm6-act]').forEach(function(btn){ btn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); var act = btn.getAttribute('data-crm6-act'); var kind = btn.getAttribute('data-kind') || currentTab; var id = btn.getAttribute('data-id'); var list = kind === 'customers' ? state.customers : state.suppliers; var rec = (list || []).find(function(x){ return String(x.id) === String(id); }); if (!rec) return; if (act === 'edit') crm6OpenEntityModal(kind, rec); else if (act === 'history') crm6HistoryModal(kind, rec); else if (act === 'trade') crm6GoNewTrade(id); else if (act === 'batch') crm6GoNewBatch(id); else if (act === 'toggleStatus') crm6ToggleStatus(kind, id); else if (act === 'delete') crm6Delete(kind, id); }); });
    qsa('[data-crm6-open-trade]').forEach(function(btn){ btn.addEventListener('click', function(e){ e.stopPropagation(); crm6OpenLinkedTrade(btn.getAttribute('data-crm6-open-trade')); }); });
    qsa('[data-crm6-open-batch]').forEach(function(btn){ btn.addEventListener('click', function(e){ e.stopPropagation(); crm6OpenLinkedBatch(btn.getAttribute('data-crm6-open-batch')); }); });
  }

  window.renderDashboard = renderDashboardV6;
  window.renderCRM = renderCRMV6;
  hideMyBoard();
  setTimeout(function(){
    hideMyBoard();
    if (!window.state) return;
    if (state.page === 'dashboard') renderDashboardV6();
    else if (state.page === 'crm') renderCRMV6();
  }, 0);
})();

</script>
